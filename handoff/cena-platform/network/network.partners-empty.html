<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Network — no partners · Cena Care-Coordinator Platform</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Source+Sans+3:wght@300;400;500;600;700&family=Source+Code+Pro:wght@400;500;600&display=swap" />
  <link rel="stylesheet" href="../assets/haven.css" />
</head>
<body>
<!--
  Network › Partners list — empty state (no partners yet). Spec: workflows/cena-platform/slots/network/states.md → partners-list-empty.
  Shell: _shell/app-shell.template.html (7-anchor, Network active). Register: dense coordinator — operational copy, no affirmation tone.
  Composes: page-header (segmented view-toggle, Partners active + Add partner) · toolbar (search + filter-pills) · data-empty-state inside a card.
  No-data case copy (vs filter-empty); CTA = Add partner.
  No real org data — synthetic.
-->
  <div class="app-shell">
    <div class="app-shell-frame">

      <nav class="app-shell-sidebar" aria-label="Primary">
        <div class="nav-header"><div class="nav-logo"><span class="font-serif text-lg text-sand-900">Cena Health</span></div></div>
        <div class="nav-section">
          <a href="../today/today.queue.html" class="nav-item"><i class="fa-solid fa-inbox" aria-hidden="true"></i><span>Today</span><span class="nav-badge" aria-label="6 items in work queue">6</span></a>
          <a href="../patients/patients.roster.html" class="nav-item"><i class="fa-solid fa-user" aria-hidden="true"></i><span>Patients</span></a>
          <a href="../referrals/referrals.pipeline.html" class="nav-item"><i class="fa-solid fa-arrow-right-arrow-left" aria-hidden="true"></i><span>Referrals</span></a>
          <a href="../diet-operations/diet-operations.weekly-plans-open.html" class="nav-item"><i class="fa-solid fa-utensils" aria-hidden="true"></i><span>Diet Operations</span></a>
          <a href="./network.orgs-list.html" class="nav-item active" aria-current="page"><i class="fa-solid fa-sitemap" aria-hidden="true"></i><span>Network</span></a>
          <a href="../clinical-library/clinical-library.guidelines.html" class="nav-item"><i class="fa-regular fa-book-medical" aria-hidden="true"></i><span>Clinical Library</span></a>
          <a href="../admin/admin.staff.html" class="nav-item"><i class="fa-solid fa-gear" aria-hidden="true"></i><span>Admin</span></a>
        </div>
        <div class="nav-section nav-section--pinned-bottom">
          <a href="#" class="nav-item"><i class="fa-solid fa-right-from-bracket" aria-hidden="true"></i><span>Sign out</span></a>
        </div>
      </nav>

      <div class="app-shell-main">
        <div class="app-shell-topbar">
          <div class="search-input" style="max-width: 24rem;">
            <i class="fa-solid fa-magnifying-glass search-input-icon" aria-hidden="true"></i>
            <input type="search" placeholder="Search patients…" aria-label="Search patients" />
          </div>
          <div class="navbar-actions">
            <a href="../today/today.queue.html" class="navbar-action-btn" aria-label="Work queue — 6 items"><i class="fa-solid fa-inbox" aria-hidden="true"></i><span class="indicator indicator-sm indicator-online"></span></a>
            <button type="button" class="navbar-action-btn" aria-label="Notifications"><i class="fa-solid fa-bell" aria-hidden="true"></i></button>
            <div class="navbar-divider"></div>
            <span class="navbar-user"><span class="avatar avatar-sm avatar-primary">AN</span><span class="text-start"><span class="navbar-user-name">Dr. Anand</span><span class="navbar-user-role">Care Coordinator</span></span></span>
          </div>
        </div>

        <main class="app-shell-content app-shell-content--full-bleed p-6" aria-label="Network program partners">
          <nav class="breadcrumb" aria-label="Breadcrumb">
            <span class="breadcrumb-current">Network</span>
          </nav>

          <div class="page-header mt-2">
            <h1 class="page-title">Network</h1>
            <div class="flex items-center gap-3">
              <div class="segmented-control">
                <a href="./network.orgs-list.html" class="segmented-control-btn">Organizations</a>
                <button type="button" class="segmented-control-btn active">Partners</button>
              </div>
              <a href="#" class="btn-primary btn-sm"><i class="fa-solid fa-plus" aria-hidden="true"></i> Add partner</a>
            </div>
          </div>

          <!-- Toolbar present even when empty, for navigability -->
          <div class="toolbar mt-4">
            <div class="toolbar-search">
              <div class="search-input" style="max-width: 22rem;">
                <i class="fa-solid fa-magnifying-glass search-input-icon" aria-hidden="true"></i>
                <input type="search" placeholder="Filter partners…" aria-label="Filter partners" />
              </div>
            </div>
            <div class="flex flex-wrap items-center gap-2">
              <button type="button" class="filter-pill active">Active</button>
              <button type="button" class="filter-pill">Inactive</button>
              <button type="button" class="filter-pill">All</button>
            </div>
          </div>

          <!-- Empty state -->
          <div class="card mt-4">
            <div class="empty-state">
              <div class="empty-state-icon"><i class="fa-solid fa-handshake" aria-hidden="true"></i></div>
              <h2>No program partners yet</h2>
              <p>Add a partner to start tracking referrals and the active patients they send.</p>
              <a href="#" class="btn-primary btn-sm"><i class="fa-solid fa-plus" aria-hidden="true"></i> Add partner</a>
            </div>
          </div>
        </main>
      </div>
    </div>
  </div>
</body>
</html>
