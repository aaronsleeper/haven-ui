<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Onboarding — Welcome · Cena × UConn handoff</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Source+Sans+3:wght@300;400;500;600;700&family=Source+Code+Pro:wght@400;500;600&display=swap" />
  <link rel="stylesheet" href="../assets/haven.css" />
</head>
<body>
  <!--
    Surface: Onboarding — Step 1 of 3: Welcome & Account Setup (onb-01)
    Spec: apps/patient/design/wireframes/onb-01-welcome.md
    Shell: .mobile-shell. Bottom-nav SUPPRESSED — focused linear stepper.
    State: Default (both fields empty, Continue disabled).
    Demo patient: Maria Rivera (name shown when referral payload includes it).
    Primitives: .mobile-shell, .onb-progress, .page-title, .card, .field-row,
                .field-label, .field-help, .field-error, .field-input-group,
                .field-addon, .btn-primary, .btn-block, .pb-safe-4, .alert-error
  -->

  <div class="mobile-shell">

    <!-- i18n bar: persistent language toggle, even during onboarding -->
    <div class="mobile-i18n-bar">
      <button type="button" class="mobile-i18n-toggle" aria-checked="true" role="switch" aria-label="English">EN</button>
      <button type="button" class="mobile-i18n-toggle" aria-checked="false" role="switch" aria-label="Español">ES</button>
    </div>

    <main aria-label="Onboarding — welcome" class="p-4 pt-16 pb-32">

      <!-- Progress indicator -->
      <p class="onb-progress" aria-label="Step 1 of 3">
        <span data-i18n-en="Step" data-i18n-es="Paso">Step</span>
        1
        <span data-i18n-en="of" data-i18n-es="de">of</span>
        3
      </p>

      <!-- Header -->
      <div class="page-header mt-2">
        <h1 class="page-title" tabindex="-1"
            data-i18n-en="Welcome to Cena Health"
            data-i18n-es="Bienvenida a Cena Health">
          Welcome to Cena Health
        </h1>
        <p class="text-sm text-sand-600 mt-2"
           data-i18n-en="Your meals and care team are ready. Let's set up your account."
           data-i18n-es="Sus comidas y equipo de cuidado están listos. Vamos a configurar su cuenta.">
          Your meals and care team are ready. Let's set up your account.
        </p>
      </div>

      <!-- Account setup form -->
      <div class="card mt-6">
        <div class="card-body">
          <form novalidate>

            <!-- Field 1: Create password -->
            <div class="field-row">
              <label class="field-label" for="password-create"
                     data-i18n-en="Create a password"
                     data-i18n-es="Cree una contraseña">
                Create a password
              </label>
              <div class="field-input-group">
                <input
                  type="password"
                  id="password-create"
                  name="password"
                  autocomplete="new-password"
                  aria-describedby="password-help"
                  aria-required="true"
                />
                <button
                  type="button"
                  class="field-addon"
                  aria-label="Show password"
                  aria-pressed="false"
                >
                  <i class="fa-regular fa-eye" aria-hidden="true"></i>
                </button>
              </div>
              <p class="field-help" id="password-help"
                 data-i18n-en="At least 8 characters"
                 data-i18n-es="Al menos 8 caracteres">
                At least 8 characters
              </p>
            </div>

            <!-- Field 2: Confirm password -->
            <div class="field-row mt-4">
              <label class="field-label" for="password-confirm"
                     data-i18n-en="Confirm password"
                     data-i18n-es="Confirme la contraseña">
                Confirm password
              </label>
              <div class="field-input-group">
                <input
                  type="password"
                  id="password-confirm"
                  name="password-confirm"
                  autocomplete="new-password"
                  aria-describedby="password-confirm-error"
                  aria-required="true"
                />
                <button
                  type="button"
                  class="field-addon"
                  aria-label="Show confirm password"
                  aria-pressed="false"
                >
                  <i class="fa-regular fa-eye" aria-hidden="true"></i>
                </button>
              </div>
              <!-- Shown only on validation error -->
              <p class="field-error" id="password-confirm-error" role="alert" hidden
                 data-i18n-en="Passwords don't match"
                 data-i18n-es="Las contraseñas no coinciden">
                Passwords don't match
              </p>
            </div>

          </form>
        </div>
      </div>

    </main>

    <!-- Sticky footer: Continue CTA + quiet "Talk to a person" link -->
    <div class="sticky bottom-0 left-0 right-0 bg-sand-50 border-t border-sand-100 p-4 pb-safe-4 space-y-3">

      <!-- Submit error (hidden by default) -->
      <div class="alert-error" role="alert" hidden>
        <span data-i18n-en="Something went wrong. Please try again."
              data-i18n-es="Algo salió mal. Por favor intente de nuevo.">
          Something went wrong. Please try again.
        </span>
      </div>

      <a
        href="./onboarding.consent.html"
        class="btn-primary btn-block"
        aria-disabled="true"
        data-i18n-en="Continue"
        data-i18n-es="Continuar"
      >
        Continue
      </a>

      <p class="text-xs text-sand-500 text-center"
         data-i18n-en="Need help? Call us: (860) 000-0000"
         data-i18n-es="¿Necesita ayuda? Llámenos: (860) 000-0000">
        Need help? Call us: (860) 000-0000
      </p>

    </div>

  </div>
</body>
</html>
