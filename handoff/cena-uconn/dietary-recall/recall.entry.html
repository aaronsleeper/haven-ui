<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dietary recall — Entry · Cena × UConn handoff</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Source+Sans+3:wght@300;400;500;600;700&family=Source+Code+Pro:wght@400;500;600&display=swap" />
  <link rel="stylesheet" href="../assets/haven.css" />
  <!--
    Wireframe: apps/patient/design/wireframes/recall-01-interview.md
    Shell: app-shell (layout-app-shell-responsive). Nav SUPPRESSED — focused agent-led moment.
    Header: quiet "Back to Home" (left) + persistent "Talk to a person" chip (right).
    Layout: layout-two-pane / layout-two-pane-grid — conversation (420px left) + food-list (fluid right).
    Mobile (<lg): single-column conversation; food-list stacked below.
    State: Entry — agent greeting + day-select chips (Yesterday / A different day).
    Demo patient: Maria Rivera.
  -->
</head>
<body>

  <div class="app-shell" data-recall-root>
    <div class="app-shell-frame">
      <div class="app-shell-main">

        <!-- Focused-session header: back affordance + handoff trigger -->
        <div class="recall-header-bar">
          <div class="recall-topbar">
            <a href="../home/home.caught-up.html" class="btn btn-ghost btn-sm" data-action="go-home">
              <i class="fa-solid fa-chevron-left" aria-hidden="true"></i>
              Back to home
            </a>
            <button type="button" class="chat-handoff-trigger is-header">
              <i class="fa-solid fa-headset" aria-hidden="true"></i>
              Talk to a person
            </button>
          </div>
        </div>

        <main class="app-shell-content p-6 lg:p-10" aria-label="Dietary recall">

          <div class="layout-two-pane">
            <div class="layout-two-pane-grid">

              <!-- Conversation region (left / 420px) -->
              <section aria-label="Dietary recall conversation">
                <div class="chat-thread">
                  <div class="chat-thread-inner">

                    <!-- agent.entry — greeting + day selection -->
                    <div class="patient-chat-message">
                      <span class="patient-chat-message-indicator" aria-hidden="true">
                        <i class="fa-solid fa-sparkle"></i>
                      </span>
                      <div>
                        <p class="patient-chat-message-body">Hi Maria! Time for your dietary check-in. I'll walk you through what you ate — we go through it a few times to catch everything. It takes about 10–15 minutes.</p>
                        <p class="patient-chat-message-body mt-2">Which day do you want to talk about?</p>
                      </div>
                    </div>

                    <!-- Day-selection chips — ephemeral, removed on tap -->
                    <div class="chat-chip-row" aria-label="Pick a day">
                      <button type="button" class="chat-chip" data-action="select-day" data-value="yesterday">Yesterday</button>
                      <button type="button" class="chat-chip is-soft" data-action="select-day" data-value="different">A different day</button>
                    </div>

                  </div>
                </div>
                <!-- F1 (2026-05-25, Grief-Context UX): entry leads with the chips above; the free-text
                     input is DEMOTED to a summonable, low-emphasis affordance (closed by default,
                     expands on tap). Day-selection is closed/chip-enumerable, so a standing chat
                     field belonged at the wrong step. Native <details> — no JS, file://-safe.
                     Label "Type instead" is a placeholder pending Plain Language Positioning. -->
                <div class="chat-input-area">
                  <details>
                    <summary class="text-link"><i class="fa-regular fa-keyboard" aria-hidden="true"></i> Type instead</summary>
                    <input type="text" placeholder="Type your answer…" aria-label="Type your answer instead of tapping a choice" />
                  </details>
                </div>
              </section>

              <!-- Food-list region (right / fluid) — empty on entry -->
              <aside aria-label="Your food list">
                <div class="patient-recall-list">
                  <div class="patient-recall-list-header">
                    <span class="patient-recall-list-header-day">Pick a day to begin</span>
                    <span class="patient-recall-list-header-pass">Waiting to start</span>
                  </div>
                  <div class="patient-recall-list-rows">
                    <!-- Empty — populated after day selection in Pass 1 -->
                  </div>
                </div>
                <!-- No footer add-button until the interview starts -->
              </aside>

            </div>
          </div>

        </main>

      </div>
    </div>
  </div>

  <script src="./dietary-recall-runner.js"></script>
</body>
</html>
