<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dietary recall — Submitted · Cena × UConn handoff</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Source+Sans+3:wght@300;400;500;600;700&family=Source+Code+Pro:wght@400;500;600&display=swap" />
  <link rel="stylesheet" href="../assets/haven.css" />
  <!--
    Wireframe: apps/patient/design/wireframes/recall-01-interview.md
    Shell: app-shell (layout-app-shell-responsive). Nav SUPPRESSED — focused agent-led moment.
    Header: quiet "Back to Home" (left) + persistent "Talk to a person" chip (right).
    Layout: layout-two-pane / layout-two-pane-grid — conversation (420px left) + receipt (fluid right).
    Mobile (<lg): single-column conversation; receipt stacked below.
    State: Confirmed — recall submitted. HEI scoring runs backend.
    HARD INVARIANT: NO score or HEI number shown to the patient.
    Agent says: "Thanks — that's it. Your care team will see this at your next session."
    Right region: log-confirmation-card (receipt variant for dietary recall).
    Demo patient: Maria Rivera.
  -->
</head>
<body>

  <div class="app-shell" data-recall-root>
    <div class="app-shell-frame">
      <div class="app-shell-main">

        <!-- Focused-session header: back affordance + handoff trigger -->
        <div class="recall-header-bar">
          <div class="recall-topbar">
            <a href="../home/home.caught-up.html" class="btn btn-ghost btn-sm" data-action="go-home">
              <i class="fa-solid fa-chevron-left" aria-hidden="true"></i>
              Back to home
            </a>
            <button type="button" class="chat-handoff-trigger is-header">
              <i class="fa-solid fa-headset" aria-hidden="true"></i>
              Talk to a person
            </button>
          </div>
        </div>

        <main class="app-shell-content p-6 lg:p-10" aria-label="Dietary recall">

          <div class="layout-two-pane">
            <div class="layout-two-pane-grid">

              <!-- Conversation region (left / 420px) -->
              <section aria-label="Dietary recall conversation">
                <div class="chat-thread">
                  <div class="chat-thread-inner">

                    <!-- agent: post-submit acknowledgement — warm, no score, no judgment -->
                    <div class="patient-chat-message">
                      <span class="patient-chat-message-indicator" aria-hidden="true">
                        <i class="fa-solid fa-sparkle"></i>
                      </span>
                      <div>
                        <p class="patient-chat-message-body">Thanks — that's it. Your care team will see this at your next session.</p>
                        <p class="patient-chat-message-body mt-2">You're all set for today.</p>
                      </div>
                    </div>

                    <!-- Optional: return-home chip -->
                    <div class="chat-button-row">
                      <button type="button" class="btn-secondary" data-action="go-home">Back to home</button>
                    </div>

                  </div>
                </div>
                <!-- Input area hidden on confirm — interview is done -->
                <div class="chat-input-area invisible" aria-hidden="true">
                  <input type="text" placeholder="" aria-label="Recall complete" disabled />
                </div>
              </section>

              <!-- Receipt region (right / fluid) — log-confirmation-card (NO score, NO HEI) -->
              <aside aria-label="Dietary recall submitted">
                <!--
                  Uses log-confirmation-card (receipt-submitted variant per component meta).
                  NO score. NO HEI number. NO "your diet was rated X/100."
                  Receipt shows: what was submitted + when + care-team reassurance.
                -->
                <div class="log-confirmation-card">
                  <div class="receipt-icon"><i class="fa-solid fa-circle-check" aria-hidden="true"></i></div>
                  <p class="receipt-title">Dietary check-in submitted</p>
                  <div class="receipt-summary">
                    <div class="receipt-summary-row">
                      <span>Day recalled</span>
                      <span>Thu, May 23</span>
                    </div>
                    <div class="receipt-summary-row">
                      <span>Items recorded</span>
                      <span>6 foods &amp; drinks</span>
                    </div>
                    <div class="receipt-summary-row">
                      <span>Submitted</span>
                      <span>Today, 10:14 AM</span>
                    </div>
                  </div>
                  <p class="receipt-timestamp">Your care team has it. They'll be in touch if anything stands out.</p>
                </div>
              </aside>

            </div>
          </div>

        </main>

      </div>
    </div>
  </div>

  <script src="./dietary-recall-runner.js"></script>
</body>
</html>
