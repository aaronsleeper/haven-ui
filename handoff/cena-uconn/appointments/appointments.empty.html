<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Appointments — Empty · Cena × UConn handoff</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Source+Sans+3:wght@300;400;500;600;700&family=Source+Code+Pro:wght@400;500;600&display=swap" />
  <link rel="stylesheet" href="../assets/haven.css" />
</head>
<body>
  <!--
    Surface: Appointments — empty state.
    Capability: cap-21 (self-service scheduling, request-only v1).
    Spec: flow-request-appointment.md § Path A (request-only); IA-v1 Appointments is a Home-row destination, NOT a tab.
    Shell: layout-app-shell-responsive — same as home.caught-up.html. IA-v1 3-tab bottom nav: Home · Order · Activity.
    Active tab: Home (Appointments is a Home-row destination, not a tab — same pattern as log-outcome).
    State: patient has no appointments on the books yet.
    Primitives: data-empty-state (card + empty-state + empty-state-icon + btn-primary).
    Demo patient: Maria Rivera.
  -->
  <div class="app-shell">
    <div class="app-shell-frame">

      <!-- Sidebar nav (desktop) -->
      <nav class="app-shell-sidebar" aria-label="Primary">
        <div class="nav-header">
          <div class="nav-logo">
            <img src="../assets/logo-cena.svg" alt="Cena Health" />
          </div>
        </div>
        <div class="nav-section">
          <a href="../home/home.caught-up.html" class="nav-item"><i class="fa-solid fa-house" aria-hidden="true"></i><span>Home</span></a>
          <a href="../order/order.browse.html" class="nav-item"><i class="fa-solid fa-utensils" aria-hidden="true"></i><span>Order</span></a>
          <a href="../activity/activity.list.html" class="nav-item"><i class="fa-regular fa-bell" aria-hidden="true"></i><span>Activity</span></a>
        </div>
        <div class="nav-section nav-section--pinned-bottom">
          <a href="../talk/talk-to-person.html" class="nav-item"><i class="fa-regular fa-circle-question" aria-hidden="true"></i><span>Talk to a person</span></a>
          <div class="nav-item">
            <div class="nav-avatar">MR</div>
            <span>Maria Rivera</span>
          </div>
        </div>
      </nav>

      <div class="app-shell-main">

        <main class="app-shell-content p-6 lg:p-10 space-y-8" aria-label="Appointments">

          <!-- Page header -->
          <div class="page-header">
            <h1 class="page-title">Appointments</h1>
          </div>

          <!-- Empty state — no appointments yet -->
          <!-- @component: data-empty-state -->
          <div class="card">
            <div class="empty-state">
              <div class="empty-state-icon">
                <i class="fa-regular fa-calendar" aria-hidden="true"></i>
              </div>
              <h3>No appointments yet</h3>
              <p>You can ask for a time to meet with your dietitian. Your care team will follow up to confirm.</p>
              <a href="appointments.request.html" class="btn-primary btn-sm">
                <i class="fa-solid fa-calendar-plus" aria-hidden="true"></i>
                Request a time
              </a>
            </div>
          </div>
          <!-- /component -->

          <!-- Talk to a person — persistent affordance -->
          <div class="list-group">
            <a href="#" class="list-group-item list-group-item-action" title="Not built in this preview">
              <span class="list-group-item-icon"><i class="fa-regular fa-user" aria-hidden="true"></i></span>
              <div class="list-group-item-content">
                <p class="list-group-item-title">Talk to a person</p>
                <p class="list-group-item-description">Reach your care team</p>
              </div>
              <span class="list-group-item-trailing"><i class="fa-solid fa-chevron-right text-sand-300" aria-hidden="true"></i></span>
            </a>
          </div>

        </main>

        <!-- Bottom tab bar (mobile) — IA-v1: Home · Order · Activity -->
        <div class="app-shell-bottom-nav">
          <nav class="mobile-bottom-nav" aria-label="Primary">
            <a href="../home/home.caught-up.html" class="mobile-bottom-nav-tab"><i class="fa-solid fa-house" aria-hidden="true"></i><span>Home</span></a>
            <a href="../order/order.browse.html" class="mobile-bottom-nav-tab"><i class="fa-solid fa-utensils" aria-hidden="true"></i><span>Order</span></a>
            <a href="../activity/activity.list.html" class="mobile-bottom-nav-tab"><i class="fa-regular fa-bell" aria-hidden="true"></i><span>Activity</span></a>
          </nav>
        </div>

      </div>
    </div>
  </div>
</body>
</html>
