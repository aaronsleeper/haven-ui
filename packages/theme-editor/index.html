<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Haven theme editor</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400..700;1,400..700&family=Source+Code+Pro:ital,wght@0,200..900;1,200..900&family=Source+Sans+3:ital,wght@0,200..900;1,200..900&display=swap"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
      integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <header class="te-header">
      <div class="te-header-row">
        <h1 class="te-title">Haven theme editor</h1>
        <div class="te-mode-selector" role="tablist" aria-label="Theme mode">
          <button type="button" class="te-mode te-mode--active" data-mode="light" role="tab" aria-selected="true">
            Light
          </button>
          <button type="button" class="te-mode" data-mode="dark" role="tab" aria-selected="false">Dark</button>
        </div>
        <div class="te-preset-selector">
          <label for="te-preset" class="te-preset-label">Preset</label>
          <select id="te-preset" class="te-preset-select">
            <option value="">— loading —</option>
          </select>
          <div class="te-preset-actions" role="group" aria-label="Preset actions">
            <button type="button" class="te-preset-action" id="te-preset-save-as" title="Save current state under a new name">Save as…</button>
            <button type="button" class="te-preset-action" id="te-preset-duplicate" title="Duplicate the current preset">Duplicate</button>
            <button type="button" class="te-preset-action te-preset-action--danger" id="te-preset-delete" title="Delete the current preset">Delete</button>
          </div>
        </div>
      </div>
    </header>

    <main class="te-main">
      <section class="te-section" aria-labelledby="te-anchors-heading">
        <h2 class="te-section-heading" id="te-anchors-heading">Anchors</h2>
        <div class="te-anchor-list" id="te-anchor-list">
          <p class="te-section-placeholder">— loading preset —</p>
        </div>
      </section>

      <section class="te-section" aria-labelledby="te-relations-heading">
        <h2 class="te-section-heading" id="te-relations-heading">Relations</h2>
        <div class="te-section-body" id="te-relations-body">
          <p class="te-section-placeholder">— loading —</p>
        </div>
      </section>

      <section class="te-section" aria-labelledby="te-tokens-heading">
        <h2 class="te-section-heading" id="te-tokens-heading">Tokens</h2>
        <div class="te-section-body" id="te-tokens-body">
          <p class="te-section-placeholder">— loading —</p>
        </div>
      </section>
    </main>

    <div id="te-issues-mount"></div>

    <footer class="te-status">
      <span class="te-status-item" id="te-status-save">Idle</span>
      <span class="te-status-sep">·</span>
      <button type="button" class="te-status-issues" id="te-status-issues" hidden>
        <span id="te-status-issues-count">0</span> issues
      </button>
      <span class="te-status-sep">·</span>
      <span class="te-status-item" id="te-status-target">target: —</span>
    </footer>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
