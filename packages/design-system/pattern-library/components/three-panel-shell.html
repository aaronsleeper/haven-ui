<!--
  @component-meta
  name: Three-Panel Shell
  category: Layout
  file: three-panel-shell.html
  classes: three-panel-shell, three-panel-shell-center
  variants: none
  when-to-use: Outermost shell for the admin, coordinator, provider, and kitchen apps. Hosts queue-sidebar (left, 240px), a flex-grow center, and thread-panel (right, 380px).
  preline-required: no
  notes: Desktop-first. Responsive collapses (right panel → overlay below lg; left sidebar → hamburger below md) are deferred and tracked in the care-coordinator design docs. Each panel is a landmark region; center uses <main>, left and right use <aside aria-label>.

  interactive-usage: none

  @end-meta
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Three-Panel Shell — Haven Pattern Library</title>
  <link rel="stylesheet" href="/src/styles/main.css">
  <link rel="stylesheet" href="/src/vendor/fontawesome/css/all.css">
</head>
<body>

  <div class="three-panel-shell">

    <!-- Slot 1: left sidebar. Any <aside> with landmark semantics — typically queue-sidebar. -->
    <aside class="queue-sidebar" aria-label="Queue sidebar">
      <header class="queue-sidebar-brand">
        <i class="fa-solid fa-circle-nodes" aria-hidden="true"></i>
        <span>Ava</span>
      </header>
      <div class="queue-sidebar-body">
        <section aria-labelledby="demo-tier">
          <h2 id="demo-tier" class="queue-section-header is-urgent">
            <i class="fa-solid fa-circle-exclamation" aria-hidden="true"></i>
            <span>Urgent · 1</span>
          </h2>
          <ul class="queue-list">
            <li>
              <button type="button" class="queue-item is-urgent active" aria-current="true">
                <span class="queue-item-header">
                  <span class="queue-item-name">Maria Garcia</span>
                  <span class="badge badge-sm badge-pill">Care Plan</span>
                </span>
                <span class="queue-item-summary">Care plan ready for final approval</span>
                <span class="queue-item-meta">
                  <span>2h ago</span>
                </span>
              </button>
            </li>
          </ul>
        </section>
      </div>
    </aside>

    <!-- Slot 2: center panel. Flex-grow main content. -->
    <main class="three-panel-shell-center" aria-label="Main content">
      <section class="p-6">
        <h1 class="section-title">Maria Garcia</h1>
        <p class="prose-section mt-2">Care plan ready for final approval.</p>
      </section>
    </main>

    <!-- Slot 3: right panel. Thread or other contextual content. -->
    <aside class="thread-panel" aria-label="Activity thread">
      <div class="thread-panel-body thread-panel-empty">
        <p>Select a queue item to see its activity.</p>
      </div>
    </aside>

  </div>

  <script type="module" src="/src/scripts/main.js"></script>
</body>
</html>
