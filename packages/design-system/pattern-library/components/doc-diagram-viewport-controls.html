<!-- DEMO WRAPPER: visual context only, do not copy -->
<section>
  <h3 class="section-title mb-4">Diagram Viewport Controls</h3>
  <p class="pl-description">
    Pan/zoom chrome layered over an interactive workflow diagram. Buttons match a hardened <code>.btn-secondary</code> variant; indicator + help text use sand-50 at 92% opacity so they recede into the warm ground.
  </p>

  <!-- @component: doc-diagram-viewport-controls -->
  <div class="diagram-viewport" style="height: 320px;">
    <div class="diagram-help" role="note" aria-label="Diagram keyboard shortcuts">drag · wheel zoom · +/− · 0 fit · ← → ↑ ↓ pan</div>
    <div class="diagram-zoom-indicator" aria-label="Current zoom">100%</div>
    <div class="diagram-controls" role="group" aria-label="Diagram pan and zoom controls">
      <button type="button"
              class="diagram-zoom-out-btn"
              aria-label="Zoom out"
              aria-keyshortcuts="-"
              title="Zoom out (−)">−</button>
      <button type="button"
              class="diagram-fit-btn"
              aria-label="Fit to viewport"
              aria-keyshortcuts="0"
              title="Fit to viewport (0)">
        <i class="fa-solid fa-arrows-to-dot" aria-hidden="true"></i>
      </button>
      <button type="button"
              class="diagram-zoom-in-btn"
              aria-label="Zoom in"
              aria-keyshortcuts="+"
              title="Zoom in (+)">+</button>
    </div>
    <!-- The diagram grid + nodes + edges live inside this viewport in production;
         PL preview leaves the canvas empty to focus the chrome review. -->
    <div class="diagram-grid" style="background: repeating-linear-gradient(45deg, var(--color-sand-100) 0 1px, transparent 1px 16px); width: 100%; height: 100%;"></div>
  </div>
  <!-- /component -->
</section>
