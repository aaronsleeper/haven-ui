<!-- DEMO WRAPPER: visual context only, do not copy -->
<section>
  <h3 class="section-title mb-4">Chat Status Row</h3>
  <p class="pl-description">
    Patient-app variant of thread-msg-system. Subdued register for CC takeover / handback / system events.
  </p>

  <div class="mb-8">
    <h4 class="text-xs font-semibold uppercase tracking-wider text-sand-500 mb-5">CC joined</h4>
    <!-- @component: chat-status-row (cc-joined) -->
    <div class="chat-status-row">
      <i class="fa-solid fa-circle-user chat-status-row-icon" aria-hidden="true"></i>
      <span>Maria joined the conversation.</span>
    </div>
    <!-- /component -->
  </div>

  <div class="mb-8">
    <h4 class="text-xs font-semibold uppercase tracking-wider text-sand-500 mb-5">CC handed back to Ava</h4>
    <!-- @component: chat-status-row (cc-handed-back) -->
    <div class="chat-status-row">
      <i class="fa-solid fa-arrow-right-arrow-left chat-status-row-icon" aria-hidden="true"></i>
      <span>Maria handed the conversation back to Ava.</span>
    </div>
    <!-- /component -->
  </div>

</section>
