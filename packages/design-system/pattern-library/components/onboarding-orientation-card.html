<section>
  <h3 class="section-title mb-4">Onboarding Orientation Card</h3>
  <p class="pl-description">3-column icon-label card for onboarding step 5 — sets expectations for meals, appointments, check-ins.</p>

  <div class="mb-8">
    <!-- @component: onboarding-orientation-card (default) -->
    <div class="onboarding-orientation-card">
      <div class="onboarding-orientation-card-body">
        <p class="onboarding-orientation-card-title">Here's what to expect each week.</p>
        <div class="onboarding-orientation-card-grid">
          <div class="onboarding-orientation-card-cell">
            <span class="onboarding-orientation-card-icon" aria-hidden="true"><i class="fa-solid fa-utensils"></i></span>
            <p class="onboarding-orientation-card-label">Meals delivered or picked up</p>
          </div>
          <div class="onboarding-orientation-card-cell">
            <span class="onboarding-orientation-card-icon" aria-hidden="true"><i class="fa-solid fa-calendar-check"></i></span>
            <p class="onboarding-orientation-card-label">Appointments with your dietitian</p>
          </div>
          <div class="onboarding-orientation-card-cell">
            <span class="onboarding-orientation-card-icon" aria-hidden="true"><i class="fa-solid fa-comments"></i></span>
            <p class="onboarding-orientation-card-label">Check-ins from your care team</p>
          </div>
        </div>
      </div>
    </div>
    <!-- /component -->
  </div>

</section>
