<!--
  @component-meta
  name: Button: Icon
  category: Primitives — Buttons
  file: btn-icon.html
  classes: btn-icon, btn-icon-primary
  when-to-use: Icon-only actions in toolbars, table action columns, and compact UIs where label text would crowd the layout. Common patterns: back-chevron headers, close (×), more-options (⋮), and toolbar utilities. Always include an aria-label.
  do-not-use-when: The action is unclear without a text label — use a labeled button instead.
  preline-required: no
  notes: btn-icon is neutral gray (44px / size-11 — meets the WCAG 2.5.5 / iOS 44pt tap-target floor). btn-icon-primary is teal filled (32px / size-8 — used in dense toolbars where the primary intent is visually obvious). Always provide aria-label for accessibility. Renders as <a class=btn-icon> when used for navigation (back-chevron exits, close-to-home), or <button type=button class=btn-icon> for in-page actions. The React port also accepts an `asComponent` prop so callers can inject a router-Link without forcing the design system to depend on a specific router.
  @end-meta
-->

<!-- DEMO WRAPPER: visual context only, do not copy -->
<section>
  <h3 class="section-title mb-4">Button: Icon</h3>
  <p class="pl-description">
    Icon-only action buttons. Neutral and primary variants.
  </p>

    <!-- @component: btn-icon -->
    <button type="button" class="btn-icon" aria-label="More options">
      <i class="fa-solid fa-ellipsis-vertical"></i>
    </button>
    <!-- /component -->

    <button type="button" class="btn-icon" aria-label="Search">
      <i class="fa-solid fa-magnifying-glass"></i>
    </button>

    <button type="button" class="btn-icon" aria-label="Edit">
      <i class="fa-solid fa-pen"></i>
    </button>

    <!-- @component: btn-icon-primary -->
    <button type="button" class="btn-icon-primary" aria-label="Settings">
      <i class="fa-solid fa-gear"></i>
    </button>
    <!-- /component -->

    <button type="button" class="btn-icon-primary" aria-label="Add">
      <i class="fa-solid fa-plus"></i>
    </button>

    <!-- @component: btn-icon (anchor variant — back-chevron header navigation) -->
    <a href="/assessment/gad-7/start" class="btn-icon" aria-label="Previous question">
      <i class="fa-solid fa-chevron-left"></i>
    </a>
    <!-- /component -->

    <!-- @component: btn-icon (anchor variant — close / save-and-exit) -->
    <a href="/" class="btn-icon" aria-label="Save and exit">
      <i class="fa-solid fa-xmark"></i>
    </a>
    <!-- /component -->
</section>
