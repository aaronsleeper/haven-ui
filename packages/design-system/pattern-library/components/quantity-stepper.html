<!-- DEMO WRAPPER: visual context only, do not copy -->
<section>
  <h3 class="section-title mb-4">Quantity Stepper</h3>
  <p class="pl-description">
    Patient-app +/- stepper for adjusting numeric quantities. Pill-shaped, secondary register.
  </p>

  <div class="mb-8">
    <h4 class="text-xs font-semibold uppercase tracking-wider text-sand-500 mb-5">Default</h4>
    <!-- @component: quantity-stepper (default) -->
    <div class="quantity-stepper">
      <button type="button" class="quantity-stepper-btn" aria-label="Decrease quantity">
        <i class="fa-solid fa-minus" aria-hidden="true"></i>
      </button>
      <span class="quantity-stepper-value" aria-live="polite">2</span>
      <button type="button" class="quantity-stepper-btn" aria-label="Increase quantity">
        <i class="fa-solid fa-plus" aria-hidden="true"></i>
      </button>
    </div>
    <!-- /component -->
  </div>

  <div class="mb-8">
    <h4 class="text-xs font-semibold uppercase tracking-wider text-sand-500 mb-5">At minimum</h4>
    <!-- @component: quantity-stepper (at-min) -->
    <div class="quantity-stepper">
      <button type="button" class="quantity-stepper-btn" aria-label="Decrease quantity" disabled>
        <i class="fa-solid fa-minus" aria-hidden="true"></i>
      </button>
      <span class="quantity-stepper-value" aria-live="polite">1</span>
      <button type="button" class="quantity-stepper-btn" aria-label="Increase quantity">
        <i class="fa-solid fa-plus" aria-hidden="true"></i>
      </button>
    </div>
    <!-- /component -->
  </div>

  <div class="mb-8">
    <h4 class="text-xs font-semibold uppercase tracking-wider text-sand-500 mb-5">At maximum</h4>
    <!-- @component: quantity-stepper (at-max) -->
    <div class="quantity-stepper">
      <button type="button" class="quantity-stepper-btn" aria-label="Decrease quantity">
        <i class="fa-solid fa-minus" aria-hidden="true"></i>
      </button>
      <span class="quantity-stepper-value" aria-live="polite">10</span>
      <button type="button" class="quantity-stepper-btn" aria-label="Increase quantity" disabled>
        <i class="fa-solid fa-plus" aria-hidden="true"></i>
      </button>
    </div>
    <!-- /component -->
  </div>

</section>
