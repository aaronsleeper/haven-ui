<!-- DEMO WRAPPER: visual context only, do not copy -->
<section>
  <h3 class="section-title mb-4">Chat Paired Numeric</h3>
  <p class="pl-description">
    Two number fields separated by a slash. Canonical use: blood pressure (systolic / diastolic).
  </p>

  <div class="mb-8">
    <h4 class="text-xs font-semibold uppercase tracking-wider text-sand-500 mb-5">Blood pressure (systolic / diastolic)</h4>
    <!-- @component: chat-paired-numeric (bp) -->
    <div class="chat-paired-numeric">
      <label class="sr-only" for="chat-bp-sys-1">Systolic</label>
      <input id="chat-bp-sys-1" type="number" inputmode="decimal" class="chat-numeric-input-field" placeholder="120" />
      <span class="chat-paired-numeric-separator" aria-hidden="true">/</span>
      <label class="sr-only" for="chat-bp-dia-1">Diastolic</label>
      <input id="chat-bp-dia-1" type="number" inputmode="decimal" class="chat-numeric-input-field" placeholder="80" />
      <span class="text-sm text-sand-700 dark:text-sand-300">mmHg</span>
    </div>
    <!-- /component -->
  </div>

</section>
