<!-- DEMO WRAPPER: visual context only, do not copy -->
<section>
  <h3 class="section-title mb-4">Chat Handoff Trigger</h3>
  <p class="pl-description">
    Persistent "talk to a person" affordance — tertiary tier, always visible. Default variant for sticky-footer mobile placement; <code>.is-header</code> for desktop chat-header placement.
  </p>

  <div class="mb-8">
    <h4 class="text-xs font-semibold uppercase tracking-wider text-sand-500 mb-5">Default — full button (sticky-footer / mobile)</h4>
    <!-- @component: chat-handoff-trigger (default) -->
    <button type="button" class="chat-handoff-trigger">
      <i class="fa-solid fa-headset" aria-hidden="true"></i>
      Talk to a person
    </button>
    <!-- /component -->
  </div>

  <div class="mb-8">
    <h4 class="text-xs font-semibold uppercase tracking-wider text-sand-500 mb-5">is-header — small chip (desktop chat-header)</h4>
    <!-- @component: chat-handoff-trigger (is-header) -->
    <button type="button" class="chat-handoff-trigger is-header">
      <i class="fa-solid fa-headset" aria-hidden="true"></i>
      Talk to a person
    </button>
    <!-- /component -->
  </div>

</section>
