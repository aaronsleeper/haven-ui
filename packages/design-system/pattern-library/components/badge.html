<!-- DEMO WRAPPER: visual context only, do not copy -->
<section>
  <h3 class="section-title mb-4">Badge</h3>
  <p class="pl-description">
    All color variants, pill shape, and compact size.
  </p>

  <!-- Color Variants -->
  <div class="mb-6">
    <p class="pl-variant-title">Color Variants</p>
      <!-- @component: badge-colors -->
      <span class="badge badge-primary">Primary</span>
      <span class="badge badge-secondary">Secondary</span>
      <span class="badge badge-neutral">Neutral</span>
      <span class="badge badge-success">Success</span>
      <span class="badge badge-warning">Warning</span>
      <span class="badge badge-error">Error</span>
      <span class="badge badge-info">Info</span>
      <!-- /component -->
  </div>

  <!-- With Icons -->
  <div class="mb-6">
    <p class="pl-variant-title">With Icons</p>
      <!-- @component: badge-with-icon -->
      <span class="badge badge-success"><i class="fa-solid fa-circle-check fa-xs"></i> Connected</span>
      <span class="badge badge-warning"><i class="fa-solid fa-clock fa-xs"></i> Pending</span>
      <span class="badge badge-error"><i class="fa-solid fa-triangle-exclamation fa-xs"></i> Attention</span>
      <!-- /component -->
  </div>

  <!-- Pill Shape -->
  <div class="mb-6">
    <p class="pl-variant-title">Pill Shape</p>
      <!-- @component: badge-pill -->
      <span class="badge badge-success badge-pill">Active</span>
      <span class="badge badge-warning badge-pill">Pending</span>
      <span class="badge badge-error badge-pill">Flagged</span>
      <span class="badge badge-neutral badge-pill">Inactive</span>
      <!-- /component -->
  </div>

  <!-- Compact Size -->
  <div class="mb-6">
    <p class="pl-variant-title">Compact (badge-sm)</p>
      <!-- @component: badge-sm -->
      <span class="badge badge-primary badge-sm">Primary</span>
      <span class="badge badge-success badge-sm">Active</span>
      <span class="badge badge-error badge-sm badge-pill">Critical</span>
      <!-- /component -->
  </div>
</section>
