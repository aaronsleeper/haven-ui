<!--
@component-meta
name: Mobile Shell
category: Layout
classes: mobile-app, mobile-shell, pb-safe-4, pb-safe-8
preline: false
description: Base layout wrapper for patient app screens. Applied as class on body + inner div. Constrains to 430px, disables desktop ambient blobs, sets warm tan background. Companion utilities .pb-safe-4 and .pb-safe-8 provide bottom-padding that clears the iOS home indicator via max(visual-floor, env(safe-area-inset-bottom)) — compose on sticky footers and page-end containers inside the shell.
-->

<!-- Usage: Add mobile-app to <body>, wrap all content in mobile-shell -->
<body class="mobile-app bg-sand-100">
  <div class="mobile-shell">
    <!-- Patient app content here -->
    <div class="px-4 py-6">
      <p class="text-sm text-sand-500">Mobile shell — max 430px, centered</p>
    </div>

    <!-- Sticky footer with safe-area bottom padding (iOS home indicator clear) -->
    <div class="sticky bottom-0 bg-white border-t border-sand-200 px-6 pt-4 pb-safe-4">
      <button type="button" class="btn-primary btn-block">Continue</button>
    </div>
  </div>
</body>
