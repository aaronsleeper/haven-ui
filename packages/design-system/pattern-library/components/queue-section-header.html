  @component-meta
  name: Queue Section Header
  category: Clinical / Healthcare
  file: queue-section-header.html
  classes: queue-section-header
  variants: is-urgent, is-attention, is-info
  when-to-use: Labels an urgency tier and its item count at the top of each section of the queue sidebar.
  preline-required: no
  notes: Renders as an h2 so the queue sidebar has proper heading hierarchy. Icon is decorative; meaning is in the text.

  interactive-usage: none

  @end-meta

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Queue Section Header — Haven Pattern Library</title>
  <link rel="stylesheet" href="/src/styles/main.css">
  <link rel="stylesheet" href="/src/vendor/fontawesome/css/all.css">
</head>
<body class="p-8 bg-gray-100 dark:bg-neutral-950">

  <h1 class="text-lg font-semibold mb-6">Queue Section Header</h1>

  <div class="max-w-[240px] bg-white dark:bg-neutral-900 border border-gray-200 dark:border-neutral-800 rounded-lg space-y-1">

    <h2 class="queue-section-header is-urgent">
      <i class="fa-solid fa-circle-exclamation" aria-hidden="true"></i>
      <span>Urgent · 2</span>
    </h2>

    <h2 class="queue-section-header is-attention">
      <i class="fa-solid fa-bell" aria-hidden="true"></i>
      <span>Needs Attention · 7</span>
    </h2>

    <h2 class="queue-section-header is-info">
      <i class="fa-solid fa-circle-info" aria-hidden="true"></i>
      <span>Informational · 3</span>
    </h2>

  </div>

  <script type="module" src="/src/scripts/main.js"></script>
</body>
</html>
