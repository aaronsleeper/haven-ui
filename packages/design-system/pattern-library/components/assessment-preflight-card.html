  variants: default

<section>
  <h3 class="section-title mb-4">Assessment Preflight Card</h3>
  <p class="pl-description">Pre-flight card before the questionnaire — name, count, time, disclosure, Begin commit.</p>

  <div class="mb-8">
    <!-- @component: assessment-preflight-card (default) -->
    <div class="assessment-preflight-card">
      <div class="assessment-preflight-card-body">
        <p class="assessment-preflight-card-title">A quick check-in on how you've been feeling</p>
        <div class="assessment-preflight-card-meta">
          <span class="assessment-preflight-card-meta-item"><i class="fa-solid fa-list-check" aria-hidden="true"></i> 9 questions</span>
          <span class="assessment-preflight-card-meta-item"><i class="fa-solid fa-clock" aria-hidden="true"></i> About 3 minutes</span>
        </div>
        <p class="assessment-preflight-card-disclosure">Your answers go to your care team. They use this to check in with you.</p>
        <div class="assessment-preflight-card-actions">
          <button type="button" class="btn-primary">Begin</button>
        </div>
      </div>
    </div>
    <!-- /component -->
  </div>

</section>
