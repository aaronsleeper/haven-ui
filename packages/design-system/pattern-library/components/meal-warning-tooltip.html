<!-- DEMO WRAPPER: visual context only, do not copy -->
<section>
  <h3 class="section-title mb-4">Meal Warning Tooltip</h3>
  <p class="pl-description">Inline warning hint on a meal item. "Never blocks, never dims" — the item stays at full opacity and remains tappable.</p>

  <div class="mb-8">
    <h4 class="text-xs font-semibold uppercase tracking-wider text-sand-500 mb-5">Inline next to meal name</h4>
    <!-- @component: meal-warning-tooltip (inline) -->
    <p class="text-base text-sand-800 dark:text-sand-200">
      Thai peanut noodle bowl
      <span class="meal-warning-tooltip" data-hs-tooltip>
        <button type="button" aria-label="Warning: contains peanuts (saved preference)">
          <i class="fa-solid fa-circle-exclamation meal-warning-tooltip-icon" aria-hidden="true"></i>
        </button>
      </span>
    </p>
    <!-- /component -->
  </div>

  <div class="mb-8">
    <h4 class="text-xs font-semibold uppercase tracking-wider text-sand-500 mb-5">Above sodium target</h4>
    <!-- @component: meal-warning-tooltip (sodium) -->
    <p class="text-base text-sand-800 dark:text-sand-200">
      Smoked turkey panini
      <span class="meal-warning-tooltip" data-hs-tooltip>
        <button type="button" aria-label="Warning: above your weekly sodium target">
          <i class="fa-solid fa-circle-exclamation meal-warning-tooltip-icon" aria-hidden="true"></i>
        </button>
      </span>
    </p>
    <!-- /component -->
  </div>

</section>
