<section id="buttons" class="mb-12">
    <h2 class="text-3xl font-bold mb-2 text-gray-900 dark:text-white">Buttons</h2>
    <p class="text-gray-500 mb-8 dark:text-neutral-400">Interactive button components in various styles, sizes, and
        states.</p>

    <!-- Solid Buttons -->
    <div class="mb-8">
        <h3 class="text-xl font-semibold mb-4 text-gray-700 dark:text-neutral-300">Solid Buttons</h3>
        <p class="text-sm text-gray-500 mb-4 dark:text-neutral-400">Use for primary actions and CTAs.</p>
        <div class="flex flex-wrap gap-3">
            <button type="button" class="btn-primary">Primary</button>
            <button type="button" class="btn-secondary">Secondary</button>
            <button type="button" class="btn-outline">Outline</button>
            <button type="button" class="btn-danger">Danger</button>
        </div>
    </div>

    <!-- Outline Buttons -->
    <div class="mb-10">
        <h3 class="text-xl font-semibold mb-4 text-gray-700 dark:text-neutral-300">Outline Buttons</h3>
        <p class="text-sm text-gray-500 mb-4 dark:text-neutral-400">Use <code class="text-xs bg-gray-100 px-1.5 py-0.5 rounded dark:bg-neutral-700">.btn-outline</code> for secondary actions. Use <code class="text-xs bg-gray-100 px-1.5 py-0.5 rounded dark:bg-neutral-700">.btn-danger</code> for destructive outline actions.</p>
        <div class="flex flex-wrap gap-3">
            <button type="button" class="btn-outline">Outline</button>
            <button type="button" class="btn-danger">Danger</button>
        </div>
    </div>

    <!-- Button Sizes -->
    <div class="mb-10">
        <h3 class="text-xl font-semibold mb-4 text-gray-700 dark:text-neutral-300">Button Sizes</h3>
        <div class="flex flex-wrap items-center gap-3">
            <button type="button" class="btn-primary btn-xs">XS Button</button>
            <button type="button" class="btn-primary btn-sm">SM Button</button>
            <button type="button" class="btn-primary">Base Button</button>
        </div>
    </div>

    <!-- Button States -->
    <div class="mb-10">
        <h3 class="text-xl font-semibold mb-4 text-gray-700 dark:text-neutral-300">Button States</h3>
        <div class="flex flex-wrap items-center gap-3">
            <button type="button" class="btn-primary">Default</button>
            <button type="button" class="btn-primary" disabled>Disabled</button>
            <!-- Loading Button -->
            <button type="button" class="btn-primary" disabled>
                <span class="animate-spin inline-block size-4 border-3 border-current border-t-transparent text-white rounded-full"
                    role="status" aria-label="loading"></span>
                Loading
            </button>
        </div>
    </div>

    <!-- Icon Buttons -->
    <div class="mb-10">
        <h3 class="text-xl font-semibold mb-4 text-gray-700 dark:text-neutral-300">Icon Buttons</h3>
        <div class="flex flex-wrap items-center gap-3">
            <button type="button" class="btn-icon-primary" aria-label="Settings">
                <i class="fa-solid fa-gear"></i>
            </button>
            <button type="button" class="btn-icon" aria-label="More options">
                <i class="fa-solid fa-ellipsis-vertical"></i>
            </button>
            <button type="button" class="btn-icon" aria-label="Search">
                <i class="fa-solid fa-magnifying-glass"></i>
            </button>
        </div>
    </div>
</section>
