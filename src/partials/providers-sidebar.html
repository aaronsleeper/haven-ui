<!-- Providers Portal - Sidebar Navigation
     Copy this block into each providers page.
     Set the `active` class on the nav item matching the current page.
     When Angular integration happens, this becomes a shared component. -->

<div id="application-sidebar" class="app-sidebar hs-overlay">
    <div class="app-sidebar-header">
        <a href="dashboard.html" aria-label="Cena Health">
            <img src="../../assets/images/logo-cenahealth-teal.svg" alt="Cena Health" class="h-8">
        </a>
    </div>

    <nav class="app-sidebar-nav">
        <ul class="sidebar-nav-list" id="sidebar-nav-list">
            <li>
                <a class="sidebar-nav-item" href="dashboard.html">
                    <i class="fa-solid fa-house w-4 text-center"></i>
                    Dashboard
                </a>
            </li>
            <li>
                <a class="sidebar-nav-item" href="patients.html">
                    <i class="fa-solid fa-users w-4 text-center"></i>
                    Patients
                </a>
            </li>
            <li>
                <a class="sidebar-nav-item" href="alerts.html">
                    <i class="fa-solid fa-triangle-exclamation w-4 text-center"></i>
                    Alerts
                </a>
            </li>
            <li>
                <a class="sidebar-nav-item" href="reports.html">
                    <i class="fa-solid fa-chart-line w-4 text-center"></i>
                    Reports
                </a>
            </li>
            <li>
                <a class="sidebar-nav-item" href="partners.html">
                    <i class="fa-solid fa-handshake w-4 text-center"></i>
                    Partners
                </a>
            </li>
            <li>
                <a class="sidebar-nav-item" href="program.html">
                    <i class="fa-solid fa-file-medical w-4 text-center"></i>
                    Program
                </a>
            </li>
        </ul>
    </nav>
</div>
<script>
    (function () {
        const currentPath = window.location.pathname;
        const navLinks = document.querySelectorAll('.sidebar-nav-item');

        navLinks.forEach(link => {
            link.classList.remove('active');

            const href = link.getAttribute('href');
            if (href && href !== '#' && currentPath.includes(href.replace('.html', ''))) {
                link.classList.add('active');
            }
        });
    })();
</script>
