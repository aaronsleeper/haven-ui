<!DOCTYPE html>
<html lang="en">

<load src="/src/partials/head.html" />

<body class="bg-gray-50 dark:bg-neutral-900">

    <!-- Sidebar Toggle (Mobile) -->
    <div class="sidebar-toggle-bar">
        <div class="flex items-center py-4">
            <button type="button" class="sidebar-toggle-btn" data-hs-overlay="#application-sidebar"
                aria-controls="application-sidebar" aria-label="Toggle navigation">
                <span class="sr-only">Toggle Navigation</span>
                <i class="fa-solid fa-bars text-xl"></i>
            </button>
            <img src="/src/assets/images/logo-cenahealth-teal.svg" alt="Cena Health" class="h-6 ms-3">
        </div>
    </div>

    <!-- Sidebar -->
    <load src="/src/partials/kitchen-sidebar.html" />
    <!-- End Sidebar -->

    <!-- Content -->
    <div class="w-full pt-10 px-4 sm:px-6 md:px-8 lg:ps-72 pb-20">

        <!-- Page Header -->
        <div class="page-header">
            <div>
                <h1>Settings</h1>
            </div>
        </div>

        <!-- Add User Section -->
        <div class="card max-w-2xl">
            <div class="card-body">
                <h2 class="text-lg font-semibold text-gray-800 dark:text-white mb-1">Add Team Member</h2>
                <p class="text-sm text-gray-500 dark:text-neutral-400 mb-6">Add a new user to your kitchen team. They
                    will receive an email invitation to set up their account.</p>

                <form class="space-y-4">
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <div>
                            <label for="first-name"
                                class="block text-sm font-medium text-gray-700 mb-1 dark:text-neutral-300">First
                                Name</label>
                            <input type="text" id="first-name" placeholder="e.g., Maria"
                                class="block w-full border-gray-200 rounded-lg text-sm focus:border-primary-500 focus:ring-primary-500 dark:bg-neutral-900 dark:border-neutral-700 dark:text-neutral-400">
                        </div>
                        <div>
                            <label for="last-name"
                                class="block text-sm font-medium text-gray-700 mb-1 dark:text-neutral-300">Last
                                Name</label>
                            <input type="text" id="last-name" placeholder="e.g., Santos"
                                class="block w-full border-gray-200 rounded-lg text-sm focus:border-primary-500 focus:ring-primary-500 dark:bg-neutral-900 dark:border-neutral-700 dark:text-neutral-400">
                        </div>
                    </div>
                    <div>
                        <label for="email"
                            class="block text-sm font-medium text-gray-700 mb-1 dark:text-neutral-300">Email
                            Address</label>
                        <input type="email" id="email" placeholder="e.g., maria@kitchen.com"
                            class="block w-full border-gray-200 rounded-lg text-sm focus:border-primary-500 focus:ring-primary-500 dark:bg-neutral-900 dark:border-neutral-700 dark:text-neutral-400">
                    </div>
                    <div class="flex justify-end pt-2">
                        <button type="submit" class="btn-primary">
                            <i class="fa-solid fa-paper-plane me-2"></i>Send Invitation
                        </button>
                    </div>
                </form>
            </div>
        </div>

    </div>

    <load src="/src/partials/scripts.html" />
</body>

</html>
