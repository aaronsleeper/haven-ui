<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Health Trend — Cena Health</title>
  <link rel="stylesheet" href="/src/styles/main.css">
  <link rel="stylesheet" href="/src/vendor/fontawesome/css/all.css">
</head>
<body class="mobile-app">
  <div class="mobile-shell pb-[64px]">

    <load src="src/partials/patient-i18n-bar.html" />

    <!-- Header -->
    <div class="flex items-center px-4 pt-14 pb-2">
      <a href="/apps/patient/health/index.html" class="btn-icon" aria-label="Go back">
        <i class="fa-solid fa-chevron-left"></i>
      </a>
      <h1 class="text-lg font-display font-semibold ml-2" id="metric-title"
          data-i18n-en="Mood" data-i18n-es="Estado de ánimo">Mood</h1>
    </div>

    <!-- Current status card -->
    <div class="card mx-4 mt-4">
      <div class="card-body flex items-center justify-between">
        <div>
          <p class="text-2xl font-semibold" id="metric-current-value"></p>
          <p class="text-xs mt-1" id="metric-last-date" style="color: var(--color-sand-400);"></p>
        </div>
        <span id="metric-trend"></span>
      </div>
    </div>

    <!-- Per-question breakdown (scored assessments only) -->
    <div class="px-4 mt-4" id="question-breakdown" style="display: none;">
      <p class="text-xs font-semibold uppercase tracking-wide mb-2" style="color: var(--color-sand-500);">Last responses</p>
      <div id="breakdown-list"></div>
    </div>

    <!-- Trend chart -->
    <div class="px-4 mt-6">
      <div class="chart-canvas-wrapper chart-line">
        <canvas id="metric-chart"></canvas>
      </div>
    </div>

    <!-- History list -->
    <div class="px-4 mt-6">
      <p class="text-xs font-semibold uppercase tracking-wide mb-2" style="color: var(--color-sand-500);">History</p>
      <div id="history-list"></div>
    </div>

    <!-- Educational card -->
    <div class="card mx-4 mt-6 mb-4" style="background: var(--color-sand-50); border-color: var(--color-sand-200);">
      <div class="card-body">
        <div class="hs-accordion" id="about-accordion">
          <button class="hs-accordion-toggle flex items-center justify-between w-full" aria-expanded="false" aria-controls="about-content">
            <span class="text-xs font-semibold uppercase tracking-wide" style="color: var(--color-sand-500);">About this check-in</span>
            <i class="fa-solid fa-chevron-down text-sand-300 text-xs transition-transform hs-accordion-active:rotate-180"></i>
          </button>
          <div id="about-content" class="hs-accordion-content hidden w-full overflow-hidden transition-[height] duration-300" role="region">
            <p class="text-sm mt-2" id="about-text" style="color: var(--color-sand-600);"></p>
          </div>
        </div>
      </div>
    </div>

  </div><!-- /.mobile-shell -->

  <load src="src/partials/patient-bottom-nav.html" />

  <script src="/src/scripts/components/i18n.js"></script>
  <script src="/src/scripts/components/patient-nav-active.js"></script>
  <!-- Chart.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/chartjs-plugin-annotation/3.1.0/chartjs-plugin-annotation.min.js"></script>
  <script src="/src/scripts/env/haven-chart-config.js"></script>
  <script src="/src/scripts/components/metric-detail.js"></script>
  <script src="/src/scripts/main.js" type="module"></script>
</body>
</html>
