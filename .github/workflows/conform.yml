name: conform

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  # Manual trigger for Linux baseline generation. Aaron's Mac lacks Docker, so
  # baselines are generated on the GH runner and downloaded as artifact for
  # local commit. Keep this trigger permanent — also useful for regenerating
  # baselines after intentional visual changes.
  workflow_dispatch:
    inputs:
      mode:
        description: 'verify runs all gates; generate-baselines runs only the visual gate with --update-snapshots and uploads __screenshots__/ as artifact'
        type: choice
        options:
          - verify
          - generate-baselines
        default: verify

concurrency:
  group: conform-${{ github.ref }}
  cancel-in-progress: true

jobs:
  conform:
    runs-on: ubuntu-latest
    env:
      CI: true
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # FA Pro Item 8b Phase 1: extract the committed subset tarball into the
      # gitignored vendor dir. Storybook's staticDirs config needs this path
      # populated before storybook:build can bundle icon assets.
      - name: Setup FontAwesome Pro
        run: bash scripts/setup-fontawesome.sh

      - name: Typecheck
        run: pnpm typecheck

      # 8 structural gates — each its own step so the GH Actions UI shows
      # per-gate pass/fail rather than one collapsed result.
      - name: conform:manifest
        run: pnpm --filter @haven/ui-react conform:manifest

      - name: conform:app-shell
        run: pnpm --filter @haven/ui-react conform:app-shell

      - name: conform:css-family
        run: pnpm --filter @haven/ui-react conform:css-family

      - name: conform:surface-role
        run: pnpm --filter @haven/ui-react conform:surface-role

      - name: conform:plain-language
        run: pnpm --filter @haven/ui-react conform:plain-language

      - name: conform:contrast-pairs
        run: pnpm --filter @haven/ui-react conform:contrast-pairs

      - name: conform:wireframe-completeness
        run: pnpm --filter @haven/ui-react conform:wireframe-completeness

      # Phase 4 (strict-mode, flipped 2026-05-07): all wireframes must declare
      # 'shells:' frontmatter. Audit confirmed 33 of 33 declared at flip time
      # (cc-05 stamp landed in 4501132 ahead of this commit). Strict-flip
      # precondition met per spec C3. Gate halts on:
      #   - wireframes missing 'shells:' field
      #   - declared shells whose pl_shell_version diverges from current canon
      #   - declared shells that aren't registered in registry.json
      #   - shape errors in the 'shells:' field
      # Backfill via `pnpm --filter @haven/ui-react shell-canon` (current canon
      # for each registered shell); always run haven-mapper before stamping —
      # the gate enforces "I saw this canon," not "I reconciled my composition
      # against this canon."
      - name: conform:wireframe-shell
        run: pnpm --filter @haven/ui-react conform:wireframe-shell
        env:
          HAVEN_WIREFRAME_SHELL_STRICT: '1'

      - name: conform:font-features
        run: pnpm --filter @haven/ui-react conform:font-features

      - name: conform:button-font-size
        run: pnpm --filter @haven/ui-react conform:button-font-size

      - name: conform:radius-pill
        run: pnpm --filter @haven/ui-react conform:radius-pill

      # Playwright runtime gates — token (computed-style set-membership) +
      # visual (pixel diff vs Linux baselines). Storybook must be built first
      # because playwright.config.ts webServer uses `storybook:serve` on CI,
      # which serves the static bundle at :5178.
      - name: Install Playwright Chromium
        run: pnpm --filter @haven/ui-react exec playwright install chromium --with-deps

      - name: Build Storybook (static bundle)
        run: pnpm --filter @haven/ui-react storybook:build

      - name: conform:token
        run: pnpm --filter @haven/ui-react conform:token

      # Visual gate now load-bearing. Baselines committed at
      # packages/ui-react/tests/conform/__screenshots__/ (generated via
      # workflow_dispatch mode=generate-baselines, first set 2026-04-21).
      # Regenerate after intentional visual changes via the same dispatch.
      # Informational until item 8b lands the enforced Playwright bootstrap (see
      # CLAUDE.md gate-triage: conform:visual is "local-only / no CI enforcement
      # yet"). continue-on-error keeps drift visible in the run + artifacts
      # without failing the build. Baselines are stale vs the v2 brand refresh
      # (queueitem/queuesectionheader/queuesidebar/responseoption/
      # responseoptiongroup) — regenerate via workflow_dispatch
      # mode=generate-baselines after brand sign-off, then drop continue-on-error.
      - name: conform:visual
        if: inputs.mode != 'generate-baselines'
        continue-on-error: true
        run: pnpm --filter @haven/ui-react conform:visual

      # Baseline-generation branch: runs only when workflow_dispatch is
      # invoked with mode=generate-baselines. Writes PNGs into __screenshots__/
      # via --update-snapshots, then uploads the directory as an artifact for
      # manual download + commit.
      - name: Generate visual baselines
        if: inputs.mode == 'generate-baselines'
        env:
          CI: true
        run: pnpm --filter @haven/ui-react exec playwright test tests/conform/visual.spec.ts --update-snapshots

      - name: Upload generated baselines
        if: inputs.mode == 'generate-baselines'
        uses: actions/upload-artifact@v4
        with:
          name: visual-baselines
          path: packages/ui-react/tests/conform/__screenshots__/
          retention-days: 7

      - name: Upload Playwright artifacts (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            packages/ui-react/playwright-report/
            packages/ui-react/test-results/
          retention-days: 7
