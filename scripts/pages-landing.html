<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Haven — Cena Health frontend preview</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400..700;1,400..700&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      /* Token values pulled from packages/design-system/src/styles/tokens/palette.css
         so the landing reads as Haven without depending on the built design-system CSS. */
      :root {
        --sand-50: #f5eee5;
        --sand-100: #eee6db;
        --sand-600: #787066;
        --sand-900: #25211D;
        --teal-500: #3A8478;
        --teal-700: #337A6E;
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        padding: 0;
        background: var(--sand-50);
        color: var(--sand-900);
        font-family: 'Inter', system-ui, sans-serif;
        font-size: 16px;
        line-height: 1.55;
      }
      main {
        max-width: 640px;
        margin: 0 auto;
        padding: 4rem 1.5rem;
      }
      h1 {
        font-family: 'Lora', Georgia, serif;
        font-size: 2.25rem;
        font-weight: 600;
        letter-spacing: -0.01em;
        margin: 0 0 0.5rem;
      }
      p.lede {
        color: var(--sand-600);
        font-size: 1rem;
        margin: 0 0 2.5rem;
      }
      ul.apps {
        list-style: none;
        padding: 0;
        margin: 0;
        display: grid;
        gap: 0.75rem;
      }
      ul.apps a {
        display: block;
        padding: 1.25rem 1.5rem;
        background: #ffffff;
        border: 1px solid var(--sand-100);
        border-radius: 0.75rem;
        text-decoration: none;
        color: var(--sand-900);
        transition: border-color 120ms ease, transform 120ms ease;
      }
      ul.apps a:hover {
        border-color: var(--teal-500);
        transform: translateY(-1px);
      }
      ul.apps h2 {
        font-family: 'Lora', Georgia, serif;
        font-size: 1.25rem;
        font-weight: 600;
        margin: 0 0 0.25rem;
      }
      ul.apps p {
        margin: 0;
        color: var(--sand-600);
        font-size: 0.9375rem;
      }
      footer {
        margin-top: 3rem;
        color: var(--sand-600);
        font-size: 0.8125rem;
      }
      footer a { color: var(--teal-700); }
    </style>
  </head>
  <body>
    <main>
      <h1>Haven</h1>
      <p class="lede">Cena Health frontend previews. Pick an app.</p>

      <ul class="apps">
        <li>
          <a href="./care-coordinator/">
            <h2>Care coordinator</h2>
            <p>Desktop surface for care team workflows.</p>
          </a>
        </li>
        <li>
          <a href="./patient/">
            <h2>Patient</h2>
            <p>Mobile-first check-ins (GAD-7, PHQ-9).</p>
          </a>
        </li>
        <li>
          <a href="./pattern-library/">
            <h2>Pattern library</h2>
            <p>The authoritative spec — tokens, components, pages.</p>
          </a>
        </li>
      </ul>

      <footer>
        Source: <a href="https://github.com/aaronsleeper/haven-ui">aaronsleeper/haven-ui</a>
      </footer>
    </main>
  </body>
</html>
