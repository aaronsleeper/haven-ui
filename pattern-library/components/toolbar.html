<!-- DEMO WRAPPER: visual context only, do not copy -->
<section>
  <h3 class="section-title mb-4">Toolbar</h3>
  <p class="pl-description">
    Horizontal bar combining search, filter pills, and a primary action. Stacks to column on mobile.
  </p>

  <!-- @component: toolbar -->
  <div class="toolbar">
    <div class="toolbar-search">
      <div class="search-input">
        <i class="fa-solid fa-magnifying-glass search-input-icon"></i>
        <input type="search" placeholder="Search patients...">
      </div>
    </div>

    <div class="flex items-center gap-2 flex-wrap">
      <button type="button" class="filter-pill active">All</button>
      <button type="button" class="filter-pill">Active</button>
      <button type="button" class="filter-pill">Flagged</button>
      <button type="button" class="filter-pill">Inactive</button>
    </div>

    <button type="button" class="btn-primary btn-sm">
      <i class="fa-solid fa-plus"></i>
      Add Patient
    </button>
  </div>
  <!-- /component -->
</section>
