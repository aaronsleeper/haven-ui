<!--
  @component-meta
  name: Form Layout Helpers
  category: Primitives — Forms
  file: form-layout.html
  classes: grid-2, form-section, required
  when-to-use: Structural helpers for arranging form fields. Use grid-2 for two-column layouts, form-section for vertical spacing, required for asterisk indicators.
  preline-required: no
  @end-meta
-->

<!-- DEMO WRAPPER: visual context only, do not copy -->
<section>
  <h3 class="section-title mb-4">Form Layout Helpers</h3>
  <p class="text-sm text-gray-500 dark:text-neutral-400 mb-4">
    Structural patterns for arranging form fields.
  </p>

    <!-- @component: form-layout-grid2 -->
    <div>
      <p class="text-sm font-medium text-gray-700 dark:text-gray-200 mb-3">Two-column grid (.grid-2)</p>
      <div class="grid-2">
        <div>
          <label for="pl-fl-first">First Name</label>
          <input type="text" id="pl-fl-first" placeholder="First name">
        </div>
        <div>
          <label for="pl-fl-last">Last Name</label>
          <input type="text" id="pl-fl-last" placeholder="Last name">
        </div>
      </div>
    </div>
    <!-- /component -->

    <!-- @component: form-layout-section -->
    <div>
      <p class="text-sm font-medium text-gray-700 dark:text-gray-200 mb-3">Form section spacing (.form-section)</p>
      <div class="form-section">
        <div>
          <label for="pl-fl-email">Email</label>
          <input type="email" id="pl-fl-email" placeholder="patient@example.com">
        </div>
        <div>
          <label for="pl-fl-phone">Phone</label>
          <input type="tel" id="pl-fl-phone" placeholder="(555) 123-4567">
        </div>
        <div>
          <label for="pl-fl-addr">Address</label>
          <input type="text" id="pl-fl-addr" placeholder="123 Main St">
        </div>
      </div>
    </div>
    <!-- /component -->

    <!-- @component: form-layout-required -->
    <div>
      <p class="text-sm font-medium text-gray-700 dark:text-gray-200 mb-3">Required field indicator (.required)</p>
      <div>
        <label for="pl-fl-req" class="required">Patient MRN</label>
        <input type="text" id="pl-fl-req" placeholder="Enter medical record number">
      </div>
    </div>
    <!-- /component -->
</section>
