<!--
  @component-meta
  name: Copy Markup
  category: Primitives — Forms
  file: form-copy-markup.html
  classes: copy-markup-wrap, copy-markup-item
  when-to-use: Dynamically adding repeated form rows — such as adding multiple phone numbers, allergy entries, or contact records — up to a configurable limit. Preline clones the target element markup on each button click.
  do-not-use-when: You only need to copy text to the clipboard — use the Clipboard component instead.
  preline-required: yes — HSCopyMarkup
  notes: |
    HSCopyMarkup is initialized on the add button via data-hs-copy-markup.
    Required attributes:
      targetSelector  — CSS selector of the element to clone (the template row)
      wrapperSelector — CSS selector of the container to append clones into
      limit           — max number of items (including original)

    Cloned items get a [data-hs-copy-markup-item] attribute automatically.
    Delete buttons inside items use data-hs-remove-element to remove their parent.
    The original item is never removed.
  @end-meta
-->

<section>
  <h3 class="section-title mb-4">Copy Markup</h3>
  <p class="text-sm text-gray-500 dark:text-neutral-400 mb-8">
    Dynamically duplicates a form row on click, up to a configurable limit. Uses Preline HSCopyMarkup. For clipboard text copy, see the Clipboard component.
  </p>

  <!-- Phone numbers -->
  <div class="mb-8">
    <h4 class="text-xs font-semibold uppercase tracking-wider text-gray-400 mb-4">Add Multiple Phone Numbers</h4>
    <!-- @component: copy-markup-phones -->
    <div class="max-w-sm">
      <label class="block text-sm font-medium text-gray-700 dark:text-gray-200 mb-3">Phone Numbers</label>

      <!-- Wrapper — receives clones -->
      <div id="cm-phones-wrap" class="copy-markup-wrap">

        <!-- Template row — this is the element that gets cloned -->
        <div id="cm-phones-item" class="copy-markup-item">
          <div class="flex items-center gap-2">
            <input type="tel" placeholder="(555) 000-0000" class="flex-1">
            <select class="select-haven w-auto shrink-0" style="min-width: 7rem;">
              <option>Mobile</option>
              <option>Home</option>
              <option>Work</option>
            </select>
            <button
              type="button"
              class="btn-icon text-error-400 hover:text-error-600 hover:bg-error-50"
              data-hs-remove-element="#cm-phones-item"
              aria-label="Remove phone number"
            >
              <i class="fa-solid fa-xmark"></i>
            </button>
          </div>
        </div>

      </div>

      <!-- Add button -->
      <button
        type="button"
        class="btn-outline btn-sm mt-3 gap-1.5"
        data-hs-copy-markup='{
          "targetSelector": "#cm-phones-item",
          "wrapperSelector": "#cm-phones-wrap",
          "limit": 4
        }'
      >
        <i class="fa-solid fa-plus text-xs"></i>
        Add phone number
      </button>
    </div>
    <!-- /component -->
  </div>

  <!-- Allergy entries -->
  <div class="mb-8">
    <h4 class="text-xs font-semibold uppercase tracking-wider text-gray-400 mb-4">Add Allergy Entries</h4>
    <!-- @component: copy-markup-allergies -->
    <div class="max-w-sm">
      <label class="block text-sm font-medium text-gray-700 dark:text-gray-200 mb-3">Food Allergies</label>
      <div id="cm-allergy-wrap" class="copy-markup-wrap">
        <div id="cm-allergy-item" class="copy-markup-item">
          <div class="flex items-center gap-2">
            <input type="text" placeholder="e.g. Peanuts" class="flex-1">
            <select class="select-haven w-auto shrink-0" style="min-width: 8rem;">
              <option>Intolerance</option>
              <option>Allergy</option>
              <option>Preference</option>
            </select>
            <button
              type="button"
              class="btn-icon text-error-400 hover:text-error-600 hover:bg-error-50"
              data-hs-remove-element="#cm-allergy-item"
              aria-label="Remove allergy"
            >
              <i class="fa-solid fa-xmark"></i>
            </button>
          </div>
        </div>
      </div>
      <button
        type="button"
        class="btn-outline btn-sm mt-3 gap-1.5"
        data-hs-copy-markup='{
          "targetSelector": "#cm-allergy-item",
          "wrapperSelector": "#cm-allergy-wrap",
          "limit": 10
        }'
      >
        <i class="fa-solid fa-plus text-xs"></i>
        Add allergy
      </button>
    </div>
    <!-- /component -->
  </div>

</section>
