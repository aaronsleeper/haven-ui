<!-- DEMO WRAPPER: visual context only, do not copy -->
<section>
  <h3 class="section-title mb-4">Button: Dark Mode Toggle</h3>
  <p class="text-sm text-gray-500 dark:text-neutral-400 mb-4">
    Pill-switch theme toggle with embedded moon/sun icons. CSS-only animation.
  </p>

    <!-- @component: btn-dark-mode-toggle -->
    <button id="dark-mode-toggle" type="button" aria-label="Toggle dark mode" aria-pressed="false"
      class="pl-theme-toggle">
      <span class="pl-theme-toggle-track">
        <i class="fa-solid fa-moon pl-theme-icon-moon"></i>
        <i class="fa-solid fa-sun pl-theme-icon-sun"></i>
        <span class="pl-theme-toggle-thumb"></span>
      </span>
      <span class="pl-theme-toggle-label">
        <span class="pl-theme-label-light">Light mode</span>
        <span class="pl-theme-label-dark">Dark mode</span>
      </span>
    </button>
    <!-- /component -->
</section>
