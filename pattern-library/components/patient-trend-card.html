<!--
@component-meta
name: Trend Card
category: Patient App
classes: trend-card, trend-card-header, trend-card-chart
preline: false
description: Tappable card showing a tracked health metric with label, trend badge, last data date, and sparkline chart. Used in the Health hub to display patient health trends at a glance. Wraps chart-sparkline for the mini chart. Requires Chart.js.
-->

<p class="pl-variant-title">With Sparkline</p>
<div class="max-w-[430px]">

  <a href="#" class="trend-card">
    <div class="trend-card-header">
      <div>
        <p class="text-sm font-medium">Mood</p>
        <p class="text-xs text-sand-400">Last: Mar 28</p>
      </div>
      <span class="trend-badge trend-improving">
        <i class="fa-solid fa-arrow-up text-[10px]"></i> Improving
      </span>
    </div>
    <div class="trend-card-chart">
      <div class="chart-canvas-wrapper chart-sparkline">
        <canvas id="demo-trend-mood"></canvas>
      </div>
    </div>
  </a>

</div>

<p class="pl-variant-title mt-8">Flat Trend</p>
<div class="max-w-[430px]">

  <a href="#" class="trend-card">
    <div class="trend-card-header">
      <div>
        <p class="text-sm font-medium">Food Security</p>
        <p class="text-xs text-sand-400">Last: Mar 15</p>
      </div>
      <span class="trend-badge trend-flat">
        <i class="fa-solid fa-arrow-right text-[10px]"></i> Stable
      </span>
    </div>
    <div class="trend-card-chart">
      <div class="chart-canvas-wrapper chart-sparkline">
        <canvas id="demo-trend-food"></canvas>
      </div>
    </div>
  </a>

</div>

<p class="pl-variant-title mt-8">Minimal Data (No Sparkline)</p>
<div class="max-w-[430px]">

  <a href="#" class="trend-card">
    <div class="trend-card-header">
      <div>
        <p class="text-sm font-medium">Depression Screen</p>
        <p class="text-xs text-sand-400">Last: Mar 20</p>
      </div>
      <span class="badge badge-success badge-sm">Low risk</span>
    </div>
    <p class="text-xs text-sand-400 mt-3">Completed 1 of 2 check-ins</p>
  </a>

</div>
