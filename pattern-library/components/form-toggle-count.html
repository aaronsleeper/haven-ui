<!--
  @component-meta
  name: Toggle Count
  category: Primitives — Forms
  file: form-toggle-count.html
  classes: (no new semantic classes — uses existing badge + btn-icon)
  when-to-use: Displaying a count that animates between two values when a checkbox or toggle is switched. Useful for showing unread counts, enrolled totals, or selected quantities.
  preline-required: yes — HSToggleCount
  notes: |
    HSToggleCount is initialized on a wrapper element via data-hs-toggle-count.
    Required attributes:
      target   — id of the checkbox/toggle input to watch
      min      — value displayed when unchecked
      max      — value displayed when checked
      duration — animation duration in ms (default 700)

    The count text is rendered inside the element with data-hs-toggle-count initialized on it.
    No custom JS needed.
  @end-meta
-->

<section>
  <h3 class="section-title mb-4">Toggle Count</h3>
  <p class="text-sm text-gray-500 dark:text-neutral-400 mb-8">
    Animates a numeric display between two values when a checkbox or toggle changes state. Uses Preline HSToggleCount.
  </p>

  <!-- Enrolled patient count -->
  <div class="mb-8">
    <h4 class="text-xs font-semibold uppercase tracking-wider text-gray-400 mb-4">Enrollment Toggle</h4>
    <!-- @component: toggle-count-enroll -->
    <div class="flex items-center gap-4">
      <label class="flex items-center gap-2 cursor-pointer">
        <input type="checkbox" id="tc-enroll" class="sr-only">
        <span class="text-sm font-medium text-gray-700 dark:text-neutral-300">Include waitlisted</span>
      </label>
      <div class="flex items-center gap-1.5">
        <span class="text-xs text-gray-500 dark:text-neutral-400">Enrolled:</span>
        <span
          class="badge badge-primary"
          data-hs-toggle-count='{
            "target": "#tc-enroll",
            "min": 42,
            "max": 58,
            "duration": 600
          }'
        >42</span>
      </div>
    </div>
    <!-- /component -->
  </div>

  <!-- Alert count -->
  <div class="mb-8">
    <h4 class="text-xs font-semibold uppercase tracking-wider text-gray-400 mb-4">Alert Count (Badge)</h4>
    <!-- @component: toggle-count-alerts -->
    <div class="flex items-center gap-4">
      <label class="flex items-center gap-2 cursor-pointer">
        <input type="checkbox" id="tc-alerts" class="sr-only">
        <span class="text-sm font-medium text-gray-700 dark:text-neutral-300">Show resolved</span>
      </label>
      <div class="flex items-center gap-1.5">
        <span class="text-xs text-gray-500 dark:text-neutral-400">Alerts:</span>
        <span
          class="badge badge-error badge-pill"
          data-hs-toggle-count='{
            "target": "#tc-alerts",
            "min": 7,
            "max": 23,
            "duration": 500
          }'
        >7</span>
      </div>
    </div>
    <!-- /component -->
  </div>

</section>
