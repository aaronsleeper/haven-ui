<!--
  @component-meta
  name: Tooltip
  category: Overlays
  file: overlay-tooltip.html
  classes: tooltip-content
  when-to-use: Brief contextual labels for icon buttons, truncated text, or any element whose purpose isn't immediately obvious. Keep tooltip text under 8 words. Do not use for critical information — it is not discoverable by touch devices.
  do-not-use-when: The content is a paragraph, has interactive elements, or needs to be persistent — use a popover instead.
  preline-required: yes — HSTooltip (FloatingUI)
  notes: |
    data-hs-tooltip on the wrapper element. The inner element with
    data-hs-tooltip-content holds the visible text and receives .tooltip-content.
    Placement options: top (default), bottom, left, right.
    Preline adds .show when the tooltip becomes visible.
  @end-meta
-->

<section>
  <h3 class="section-title mb-4">Tooltip</h3>
  <p class="text-sm text-gray-500 dark:text-neutral-400 mb-8">
    Brief contextual labels on hover or focus. Powered by Preline HSTooltip via FloatingUI. Keep content under 8 words.
  </p>

  <!-- Basic tooltips — placement variants -->
  <div class="mb-8">
    <h4 class="text-xs font-semibold uppercase tracking-wider text-gray-400 mb-5">Placement Variants</h4>
    <!-- @component: tooltip-placements -->
    <div class="flex flex-wrap items-center gap-4">

      <div class="hs-tooltip inline-block">
        <button type="button" class="btn-outline btn-sm hs-tooltip-toggle">
          Top (default)
        </button>
        <span class="hs-tooltip-content tooltip-content" role="tooltip" data-popper-placement="top">
          Appears above the trigger
        </span>
      </div>

      <div class="hs-tooltip [--placement:bottom] inline-block">
        <button type="button" class="btn-outline btn-sm hs-tooltip-toggle">
          Bottom
        </button>
        <span class="hs-tooltip-content tooltip-content" role="tooltip">
          Appears below the trigger
        </span>
      </div>

      <div class="hs-tooltip [--placement:left] inline-block">
        <button type="button" class="btn-outline btn-sm hs-tooltip-toggle">
          Left
        </button>
        <span class="hs-tooltip-content tooltip-content" role="tooltip">
          Appears to the left
        </span>
      </div>

      <div class="hs-tooltip [--placement:right] inline-block">
        <button type="button" class="btn-outline btn-sm hs-tooltip-toggle">
          Right
        </button>
        <span class="hs-tooltip-content tooltip-content" role="tooltip">
          Appears to the right
        </span>
      </div>

    </div>
    <!-- /component -->
  </div>

  <!-- Tooltip on icon button -->
  <div class="mb-8">
    <h4 class="text-xs font-semibold uppercase tracking-wider text-gray-400 mb-5">On Icon Button</h4>
    <!-- @component: tooltip-icon-btn -->
    <div class="flex items-center gap-3">

      <div class="hs-tooltip inline-block">
        <button type="button" class="btn-icon hs-tooltip-toggle" aria-label="Export to CSV">
          <i class="fa-solid fa-file-csv"></i>
        </button>
        <span class="hs-tooltip-content tooltip-content" role="tooltip">Export to CSV</span>
      </div>

      <div class="hs-tooltip inline-block">
        <button type="button" class="btn-icon hs-tooltip-toggle" aria-label="Filter results">
          <i class="fa-solid fa-filter"></i>
        </button>
        <span class="hs-tooltip-content tooltip-content" role="tooltip">Filter results</span>
      </div>

      <div class="hs-tooltip inline-block">
        <button type="button" class="btn-icon hs-tooltip-toggle" aria-label="View patient timeline">
          <i class="fa-solid fa-clock-rotate-left"></i>
        </button>
        <span class="hs-tooltip-content tooltip-content" role="tooltip">View timeline</span>
      </div>

    </div>
    <!-- /component -->
  </div>

</section>
