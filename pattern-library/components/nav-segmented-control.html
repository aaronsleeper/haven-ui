  <h3 class="section-title mb-4">Segmented Control</h3>

    Mutually exclusive toggle for 2-3 view options.

    <div>
      <p class="text-xs text-gray-600 dark:text-neutral-500 mb-2">.segmented-control</p>

      </div>
