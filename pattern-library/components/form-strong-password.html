<!--
  @component-meta
  name: Strong Password
  category: Primitives — Forms
  file: form-strong-password.html
  classes: strong-password-strip, strong-password-hints
  when-to-use: Account creation and password change screens where password strength feedback helps the user meet requirements.
  preline-required: yes — HSStrongPassword
  notes: |
    HSStrongPassword is initialized on a wrapper element via data-hs-strong-password.
    Required attributes:
      target     — id of the password <input> to watch
      hints      — id of the hints container (injected by Preline)
      stripClasses — space-separated class string applied to each strength strip
      minLength  — minimum character count (default 6)

    Preline injects .strong-password-strip elements and updates their bg color.
    Hints are injected inside the hints container automatically.
    Both `.strong-password-strip` and `.strong-password-hints` are semantic classes
    that style those injected elements.
  @end-meta
-->

<section>
  <h3 class="section-title mb-4">Strong Password</h3>
  <p class="text-sm text-gray-500 dark:text-neutral-400 mb-8">
    Real-time password strength meter with rule hints. Preline HSStrongPassword injects the strength strips and rule checklist automatically.
  </p>

  <!-- @component: strong-password -->
  <div class="max-w-sm">
    <label class="block text-sm font-medium text-gray-700 dark:text-gray-200 mb-2" for="sp-password">
      Create Password
    </label>

    <!-- Toggle password wrapper (reuse toggle pattern) -->
    <div class="relative mb-2">
      <input
        id="sp-password"
        type="password"
        class="pr-10"
        placeholder="Enter a secure password"
        autocomplete="new-password"
      >
      <button
        type="button"
        class="btn-icon absolute end-0 top-1/2 -translate-y-1/2 me-1"
        data-hs-toggle-password='{"target": "#sp-password"}'
        aria-label="Toggle password visibility"
      >
        <i class="fa-solid fa-eye text-gray-400" data-hs-toggle-password-show-icon></i>
        <i class="fa-solid fa-eye-slash text-gray-400 hidden" data-hs-toggle-password-hide-icon></i>
      </button>
    </div>

    <!-- Strength meter + hints — Preline injects content here -->
    <div
      id="sp-strength"
      data-hs-strong-password='{
        "target": "#sp-password",
        "hints": "#sp-hints",
        "stripClasses": "strong-password-strip",
        "minLength": 8
      }'
      class="flex gap-1 mb-2"
    ></div>

    <!-- Hints container — Preline populates this -->
    <div id="sp-hints" class="strong-password-hints"></div>
  </div>
  <!-- /component -->

</section>
