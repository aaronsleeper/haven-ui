<!-- DEMO WRAPPER: visual context only, do not copy -->
<section>
  <h3 class="section-title mb-4">Application Shell</h3>
  <p class="pl-description">
    Sidebar + main content wrapper. Shown here at reduced scale with static positioning.
  </p>

    <!-- @component: layout-app-shell -->
    <!-- Note: In production, .app-sidebar is position:fixed. This demo uses static + border for visibility. -->
    <div class="flex border border-gray-200 rounded-xl overflow-hidden dark:border-neutral-700" style="min-height: 320px;">

      <!-- Sidebar (static demo) -->
      <aside class="w-64 shrink-0 bg-gray-50 border-e border-gray-200 pt-7 pb-10 overflow-y-auto dark:bg-neutral-900 dark:border-neutral-700">
        <div class="app-sidebar-header">
          <span class="app-sidebar-brand">Haven</span>
          <p class="text-xs text-gray-600 dark:text-neutral-400 mt-1">Care Platform</p>
        </div>
        <nav class="app-sidebar-nav">
          <ul class="sidebar-nav-list">
            <li><a href="#" class="sidebar-nav-item active"><i class="fa-solid fa-house fa-fw"></i> Dashboard</a></li>
            <li><a href="#" class="sidebar-nav-item"><i class="fa-solid fa-users fa-fw"></i> Patients</a></li>
            <li><a href="#" class="sidebar-nav-item"><i class="fa-solid fa-utensils fa-fw"></i> Meals</a></li>
          </ul>
        </nav>
      </aside>

      <!-- Main content area -->
      <main class="flex-1 min-w-0 p-8 bg-gray-50 dark:bg-neutral-900">
        <div class="page-header">
          <h1>Dashboard</h1>
        </div>
        <div class="card">
          <div class="card-body">
            <p class="text-gray-500 dark:text-neutral-400">Main content renders here, offset by the sidebar width (ml-64 in production).</p>
          </div>
        </div>
      </main>

    </div>

    <!-- Mobile toggle bar (shown separately for reference) -->
    <div class="mt-4">
      <p class="text-xs text-gray-600 dark:text-neutral-500 mb-2">Mobile sidebar toggle (lg:hidden):</p>
      <div class="sidebar-toggle-bar py-2 flex items-center gap-2">
        <button type="button" class="sidebar-toggle-btn">
          <i class="fa-solid fa-bars"></i>
          <span class="sr-only">Toggle Navigation</span>
        </button>
        <span class="text-sm text-gray-500">Haven</span>
      </div>
    </div>
    <!-- /component -->
</section>
