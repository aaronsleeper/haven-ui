<!--
  @component-meta
  name: Toggle Password
  category: Primitives — Forms
  file: form-toggle-password.html
  classes: (no new semantic classes — uses existing input + btn-icon)
  when-to-use: Any password input where the user should be able to reveal their password. Required on login, account creation, and password change screens.
  preline-required: yes — HSTogglePassword
  notes: |
    Uses data-hs-toggle-password on the eye button with a `target` pointing to the
    input's id. Preline toggles the input type between "password" and "text".
    The eye/eye-slash icon swap is handled with conditional FA classes + JS.
    No new semantic classes needed — uses .btn-icon from existing system.
  @end-meta
-->

<section>
  <h3 class="section-title mb-4">Toggle Password</h3>
  <p class="text-sm text-gray-500 dark:text-neutral-400 mb-8">
    Reveals or hides password text in an input. Driven by Preline HSTogglePassword — no custom JS needed.
  </p>

  <!-- Basic toggle password -->
  <div class="mb-8">
    <h4 class="text-xs font-semibold uppercase tracking-wider text-gray-400 mb-4">Default</h4>
    <!-- @component: toggle-password -->
    <div class="max-w-sm">
      <label class="block text-sm font-medium text-gray-700 dark:text-gray-200 mb-2" for="tp-password">
        Password
      </label>
      <div class="relative">
        <input
          id="tp-password"
          type="password"
          class="pr-10"
          placeholder="Enter your password"
          autocomplete="current-password"
        >
        <button
          type="button"
          class="btn-icon absolute end-0 top-1/2 -translate-y-1/2 me-1"
          data-hs-toggle-password='{"target": "#tp-password"}'
          aria-label="Toggle password visibility"
        >
          <i class="fa-solid fa-eye text-gray-400" data-hs-toggle-password-show-icon></i>
          <i class="fa-solid fa-eye-slash text-gray-400 hidden" data-hs-toggle-password-hide-icon></i>
        </button>
      </div>
    </div>
    <!-- /component -->
  </div>

  <!-- Confirm password — two fields linked -->
  <div class="mb-8">
    <h4 class="text-xs font-semibold uppercase tracking-wider text-gray-400 mb-4">Linked Fields (New + Confirm)</h4>
    <p class="text-sm text-gray-500 dark:text-neutral-400 mb-4">
      A single toggle button can reveal both fields simultaneously by passing both IDs in the target array.
    </p>
    <!-- @component: toggle-password-linked -->
    <div class="max-w-sm space-y-3">
      <div>
        <label class="block text-sm font-medium text-gray-700 dark:text-gray-200 mb-2" for="tp-new">New Password</label>
        <input id="tp-new" type="password" placeholder="New password" autocomplete="new-password">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 dark:text-gray-200 mb-2" for="tp-confirm">Confirm Password</label>
        <input id="tp-confirm" type="password" placeholder="Confirm password" autocomplete="new-password">
      </div>
      <div class="flex items-center gap-2">
        <button
          type="button"
          class="btn-icon"
          data-hs-toggle-password='{"target": ["#tp-new", "#tp-confirm"]}'
          aria-label="Toggle password visibility"
        >
          <i class="fa-solid fa-eye text-gray-400" data-hs-toggle-password-show-icon></i>
          <i class="fa-solid fa-eye-slash text-gray-400 hidden" data-hs-toggle-password-hide-icon></i>
        </button>
        <span class="text-sm text-gray-500 dark:text-neutral-400">Show passwords</span>
      </div>
    </div>
    <!-- /component -->
  </div>

</section>
