<!DOCTYPE html>
<html lang="en">

<load src="/src/partials/head.html" />

<body class="bg-gray-50 dark:bg-neutral-900">

    <!-- This page is used by delivery drivers, not the kitchen sidebar app.
         It's a standalone mobile-first form, no sidebar needed.
         Kept in the kitchen folder because it's part of the kitchen partner workflow. -->

    <!-- Header -->
    <div class="bg-white border-b border-gray-200 px-4 py-3 dark:bg-neutral-800 dark:border-neutral-700">
        <div class="max-w-lg mx-auto flex items-center gap-3">
            <img src="/src/assets/images/logo-cenahealth-teal.svg" alt="Cena Health" class="h-6">
            <span class="text-sm font-medium text-gray-500 dark:text-neutral-400">Delivery Update</span>
        </div>
    </div>

    <!-- Content -->
    <main class="max-w-lg mx-auto px-4 py-6">

        <!-- Order Information Card -->
        <div class="card mb-6">
            <!-- Map placeholder -->
            <div class="w-full h-40 bg-gray-200 rounded-t-xl flex items-center justify-center dark:bg-neutral-700">
                <i class="fa-solid fa-map-location-dot text-3xl text-gray-400 dark:text-neutral-500"></i>
            </div>

            <div class="card-body">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-lg font-semibold text-gray-800 dark:text-white">Order #ORD-8829</h2>
                    <span class="badge badge-primary badge-pill badge-sm">Scan Success</span>
                </div>

                <div class="space-y-2 text-sm text-gray-600 dark:text-neutral-400">
                    <div class="flex items-center gap-2">
                        <i class="fa-solid fa-user text-gray-400 w-4 text-center"></i>
                        <span>Patient: <strong class="text-gray-800 dark:text-neutral-200">John D.</strong></span>
                    </div>
                    <div class="flex items-start gap-2">
                        <i class="fa-solid fa-location-dot text-gray-400 w-4 text-center mt-0.5"></i>
                        <span>123 Logistics Lane, Tech City, TC 54321</span>
                    </div>
                    <div class="flex items-center gap-2">
                        <i class="fa-solid fa-box text-gray-400 w-4 text-center"></i>
                        <span>3 hot meals, 2 cold meals</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Status Selection -->
        <div class="mb-6">
            <h3 class="text-sm font-medium text-gray-700 mb-3 dark:text-neutral-300">Delivery Status</h3>
            <div class="grid grid-cols-2 gap-3">
                <button type="button" class="btn btn-outline w-full justify-center gap-2 py-3"
                    onclick="selectStatus(this, 'delivered')" id="btn-delivered">
                    <i class="fa-solid fa-circle-check"></i>
                    Delivered
                </button>
                <button type="button"
                    class="btn btn-outline w-full justify-center gap-2 py-3 text-error-600 border-error-200 hover:bg-error-50"
                    onclick="selectStatus(this, 'not-delivered')" id="btn-not-delivered">
                    <i class="fa-solid fa-circle-xmark"></i>
                    Not Delivered
                </button>
            </div>
        </div>

        <!-- Photo capture (mobile camera) -->
        <div class="mb-6">
            <h3 class="text-sm font-medium text-gray-700 mb-3 dark:text-neutral-300">Photo Proof (Optional)</h3>
            <label
                class="flex flex-col items-center justify-center w-full h-24 border-2 border-dashed border-gray-300 rounded-lg cursor-pointer hover:border-primary-400 hover:bg-gray-50 transition-colors dark:border-neutral-600 dark:hover:border-primary-500">
                <i class="fa-solid fa-camera text-gray-400 text-xl mb-1"></i>
                <span class="text-xs text-gray-500 dark:text-neutral-400">Tap to take photo</span>
                <input type="file" accept="image/*" capture="environment" class="hidden">
            </label>
        </div>

        <!-- Driver Notes -->
        <div class="mb-6">
            <label for="driver-notes" class="block text-sm font-medium text-gray-700 mb-1 dark:text-neutral-300">Driver
                Notes (Optional)</label>
            <textarea id="driver-notes" rows="3" placeholder="e.g., Left at front porch, gate code used..."
                class="block w-full border-gray-200 rounded-lg text-sm focus:border-primary-500 focus:ring-primary-500 dark:bg-neutral-900 dark:border-neutral-700 dark:text-neutral-400"></textarea>
        </div>

        <!-- Submit -->
        <button type="submit" class="btn-primary w-full justify-center gap-2 py-3" id="btn-submit" disabled>
            <span>Submit Status Update</span>
            <i class="fa-solid fa-paper-plane text-sm"></i>
        </button>

        <footer class="text-center text-xs text-gray-400 mt-6 dark:text-neutral-500">
            <p>Timestamp: Feb 13, 2026 - 14:45 PM</p>
        </footer>
    </main>

    <script>
        function selectStatus(button, status) {
            // Reset both buttons
            document.getElementById('btn-delivered').classList.remove('btn-primary', 'text-white');
            document.getElementById('btn-delivered').classList.add('btn-outline');
            document.getElementById('btn-not-delivered').classList.remove('bg-error-600', 'text-white', 'border-error-600');
            document.getElementById('btn-not-delivered').classList.add('btn-outline', 'text-error-600', 'border-error-200');

            // Activate selected
            if (status === 'delivered') {
                button.classList.remove('btn-outline');
                button.classList.add('btn-primary', 'text-white');
            } else {
                button.classList.remove('btn-outline', 'text-error-600', 'border-error-200');
                button.classList.add('bg-error-600', 'text-white', 'border-error-600');
            }

            // Enable submit
            document.getElementById('btn-submit').disabled = false;
        }
    </script>
    <load src="/src/partials/scripts.html" />
</body>

</html>
