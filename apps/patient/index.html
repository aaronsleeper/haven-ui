    <!-- Google Fonts — per DESIGN.md §Typography: Lora (serif), Source Sans 3
         (sans), Source Code Pro (mono). Mirrors packages/design-system/src/
         partials/head.html. Without these, font-feature-settings from base/
         font-features.css applies to system fallback fonts (Times, Helvetica),
         whose OpenType feature tables map the brand feature codes to
         superscript / small-cap / stylistic-set glyphs — text renders as
         superscript-looking jumbles. See CLAUDE.md "Brand fonts per app". -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400..700;1,400..700&family=Source+Code+Pro:ital,wght@0,200..900;1,200..900&family=Source+Sans+3:ital,wght@0,200..900;1,200..900&display=swap" rel="stylesheet" />
  </head>
