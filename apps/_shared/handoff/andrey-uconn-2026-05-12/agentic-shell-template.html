<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cena Health — Agentic Shell (template)</title>

  <!-- Brand font stack: Lora (headings), Source Sans 3 (body/UI), Source Code Pro (code).
       Per Cena Health brand spec / DESIGN.md §Typography. -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&family=Source+Code+Pro&family=Source+Sans+3:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600;1,700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="haven-shell.css">
</head>
<body>

  <div class="app-shell app-shell--agentic">
    <div class="agentic-shell">

      <!-- ============================================================
           Slot 1 — Nav (left chrome rail)
           Chrome surface; sand-100 bg; logo + nav sections + items.
           Active items use font-weight (Bold), not background color.
           ============================================================ -->
      <nav class="panel-nav" aria-label="Primary">
        <div class="nav-header">
          <div class="nav-logo">
            <img src="logo-cenahealth-teal.svg" alt="Cena Health">
          </div>
        </div>

        <!-- Slot: nav sections + nav items go here.
             Pattern:
               <div class="nav-section">
                 <div class="nav-section-label"><span>Conversations</span></div>
                 <div class="nav-item active"><i class="…"></i><span>Item label</span></div>
                 <div class="nav-item"><i class="…"></i><span>Item label</span></div>
               </div>                                                       -->

      </nav>

      <!-- Inter-pane splitter (nav ↔ chat). Static 1px; thickens to 3px teal on hover. -->
      <div class="panel-splitter" aria-hidden="true"></div>

      <!-- ============================================================
           Slot 2 — Chat (center pane)
           Pane surface; translucent white over page. Primary surface
           for agent conversation. flex-1; min-width 480 floor; never
           collapses. Composer is sticky-bottom.

           Three children: chat-thread-header (chrome strip for
           persistent affordances; non-scrolling) + chat-thread
           (scrolling messages region) + chat-input-area (composer).
           ============================================================ -->
      <main class="panel-chat" aria-label="Activity">
        <div class="chat-thread-header">

          <!-- Slot: persistent chat-pane chrome.
               Typical content: panel-toggle buttons (.btn-panel-toggle),
               persistent affordances (chat-handoff-trigger.is-header),
               app-context indicators. Stays fixed above the scrolling
               thread; never compresses.                                  -->

        </div>
        <div class="chat-thread">
          <div class="chat-thread-inner">

            <!-- Slot: thread content goes here.
                 Compose Ava messages, user messages, tool calls, etc.
                 inside this inner container.                            -->

          </div>
        </div>
        <div class="chat-input-area">

          <!-- Slot: prompt input / composer goes here. -->

        </div>
      </main>

      <!-- Inter-pane splitter (chat ↔ content). -->
      <div class="panel-splitter" aria-hidden="true"></div>

      <!-- ============================================================
           Slot 3 — Content (right pane)
           Pane surface; translucent white over page. Contextual artifact
           opened by the agent. Two composition modes per DESIGN.md:
             A) Chrome-led — .content-header (title strip) + .content-body
             B) Record-led — single scroll wrapper with a RecordHeader as
                first child (no .content-header).
           ============================================================ -->
      <aside class="panel-content" aria-label="Content">
        <div class="content-body">

          <!-- Slot: artifact content goes here. -->

        </div>
      </aside>

    </div>
  </div>

</body>
</html>
